<div class="modal-backdrop" id="modalBackdrop"><div class="modal" id="modal"></div></div>
<input type="file" id="fileImport" accept="application/json" style="display:none">
<input type="file" id="filePdf" accept="application/pdf" style="display:none" multiple>
<div class="toast" id="toast"></div>
<div class="drop-overlay" id="dropOverlay" aria-hidden="true">
  <div class="drop-overlay-card">
    <div class="drop-overlay-title">Drop JSON to Import</div>
    <div class="drop-overlay-copy">Release your file to load templates, tags, and caret templates.</div>
  </div>
</div>

<script>
/* ============================================================================
   STATE — single source of truth
   ============================================================================ */

const STORAGE_KEY = 'tagBuilder.v1';

// blankTag() returns a fresh tag object every call. Doing this as a function
// (instead of a constant) avoids accidentally sharing references between tags.
const blankTag = () => ({
  id: 'tag_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
  templateName: '',
  type: 'NCR',
  revisionNumber: 0,      // if > 0, prepends "*Revision N*" line at the top
  drawings: [
    { type: 'Engineering', custom: '', number: '', sheet: '', rev: '', location: '' }
  ],
  processSpecs: [
    { number: '', section: '', rev: '' }
  ],
  items: [ blankItem() ],
  lso: '',
  lio: '',
  carrotTemplateId: null,
  carrotTemplateName: '',
  carrotsText: '',
  attachmentsEnabled: true,
  attachmentsText: '*See Attachments*',
  pinned: false,        // pin tags to the top of the sidebar
  createdAt: Date.now(),
  updatedAt: Date.now()
});

function blankTagForType(type = 'NCR') {
  const tag = blankTag();
  tag.type = type;
  if (type === 'NCO') tag.attachmentsEnabled = false;
  return tag;
}

function blankItem(itemNumber = '') {
  return {
    itemNumber: itemNumber ? String(itemNumber) : '',
    countOf: '', countTotal: '',
    partNumber: '', description: '',
    discrepancy: '',
    measL: '', measW: '', measD: '',
    measCustom: '',
    sbText: '',
    sbAutoRef: true
  };
}

const state = {
  activeTab: 'NCRs',
  activeTheme: 'theme-midnight',
  tags: [],          // saved NCR tags
  templates: [],     // saved templates
  carrotTemplates: [], // saved NCO carrot templates
  current: blankTagForType('NCR'),
  selectedId: null,  // id of the currently-loaded template (null = new)
  selectedCarrotId: null,
  previewSuppressed: false,
  carrotPreviewSuppressed: false,
  search: '',
  dateFilter: 'all', // 'all' | 'today' | 'week' | 'month'
  guides: [],        // [{name, url}] PDFs loaded via file picker (object URLs)
  activeGuideIdx: 0,
  customThemes: [],  // user-built themes [{id, name, base, accent, accent2}]
  focusMode: false,  // transient — not persisted
  formattedPreview: false,
  uppercaseText: false
};

/* ---------- PERSISTENCE ----------
   Tags + templates + active theme survive page reloads via localStorage.
   PDF guides do NOT persist — object URLs only live for the session,
   which is fine since the user loads from a shared folder each time. */
function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    activeTheme: state.activeTheme,
    tags: state.tags,
    templates: state.templates,
    carrotTemplates: state.carrotTemplates,
    customThemes: state.customThemes,
    formattedPreview: state.formattedPreview,
    uppercaseText: state.uppercaseText
  }));
}
function loadPersisted() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    state.activeTheme = data.activeTheme || state.activeTheme;
    state.tags = data.tags || [];
    state.templates = data.templates || [];
    state.carrotTemplates = data.carrotTemplates || [];
    state.customThemes = data.customThemes || [];
    state.formattedPreview = !!data.formattedPreview;
    state.uppercaseText = !!data.uppercaseText;
  } catch (e) { console.warn('Load failed', e); }
}

/* On first run, seed a sample "Sharp Dent" template so users can see what a
   filled-out tag looks like and how templates work. We store a "seeded" flag
   so we don't keep re-adding it after the user deletes the sample. */
function seedDefaults() {
  if (localStorage.getItem(STORAGE_KEY + '.seeded')) return;
  state.templates.push({
    id: 'tpl_sharp_dent',
    templateName: 'Sharp Dent',
    type: 'NCR',
    revisionNumber: 0,
    drawings: [
      { type: 'Engineering', custom: '', number: '123A1234', sheet: '1', rev: 'A' }
    ],
    processSpecs: [
      { number: 'BAC1234', section: '11.1a', rev: 'A' }
    ],
    items: [{
      countOf: '1', countTotal: '8',
      partNumber: '123Q1234-1', description: 'Tube Assy',
      discrepancy: 'has a sharp dent C/T the AS56942 Fitting',
      measL: '0.172', measW: '0.086', measD: '0.007',
      measCustom: '',
      sbText: 'No blah blah on the tube'
    }],
    lso: '100/010',
    lio: '110/010',
    carrotTemplateId: null,
    carrotTemplateName: '',
    carrotsText: '',
    attachmentsEnabled: true,
    attachmentsText: '*See Attachments*',
    createdAt: Date.now(),
    updatedAt: Date.now()
  });
  localStorage.setItem(STORAGE_KEY + '.seeded', '1');
  persist();
}

/* ---------- DOM HELPERS ---------- */
const $  = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

// el(tag, attrs, children) — tiny createElement helper.
// Beginner note: this lets us build DOM trees declaratively, almost like JSX.
function el(tag, attrs = {}, children = []) {
  const node = document.createElement(tag);
  for (const k in attrs) {
    if (attrs[k] == null) continue;
    if (k === 'class') node.className = attrs[k];
    else if (k === 'html') node.innerHTML = attrs[k];
    else if (k === 'style') node.style.cssText = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function')
      node.addEventListener(k.slice(2), attrs[k]);
    else node.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null || c === false) return;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return node;
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

const clone = o => JSON.parse(JSON.stringify(o));

function formatDate(ms) {
  const d = new Date(ms);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
         ' ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}

/* ============================================================================
   RENDER — TABS & THEME
   ============================================================================ */
const TABS = ['NCRs', 'NCOs', 'Scrap', 'Guides'];

function renderTabs() {
  const root = $('#tabs');
  root.innerHTML = '';
  TABS.forEach(name => {
    root.appendChild(el('button', {
      class: 'tab' + (state.activeTab === name ? ' active' : ''),
      onclick: () => {
        state.activeTab = name;
        // If switching to a tab whose type differs from the in-progress tag,
        // reset the buffer to a fresh blank tag of the right type so the
        // builder shows the correct context.
        const expected = currentTagType();
        if ((name === 'NCRs' || name === 'NCOs') && state.current.type !== expected) {
          state.current = blankTagForType(expected);
          state.selectedId = null;
          state.selectedCarrotId = null;
          state.previewSuppressed = false;
          state.carrotPreviewSuppressed = false;
        }
        renderAll();
      }
    }, name));
  });
}

function applyTheme() {
  // Reset any inline custom-theme variables before applying the next theme.
  ['--accent', '--accent-2', '--accent-grad', '--shadow'].forEach(p =>
    document.body.style.removeProperty(p));

  let cls = state.activeTheme;
  if (cls && cls.startsWith('custom:')) {
    const id = cls.slice(7);
    const ct = state.customThemes.find(t => t.id === id);
    if (ct) {
      cls = ct.base || 'theme-midnight';
      document.body.style.setProperty('--accent', ct.accent);
      document.body.style.setProperty('--accent-2', ct.accent2);
      document.body.style.setProperty('--accent-grad',
        `linear-gradient(135deg, ${ct.accent}, ${ct.accent2})`);
      document.body.style.setProperty('--shadow',
        `0 4px 24px ${hexToRgba(ct.accent, 0.2)}`);
    } else {
      cls = 'theme-midnight';
    }
  }
  document.body.className = cls + (state.focusMode ? ' focus-mode' : '');
}

// Convert #rrggbb (or #rgb) to rgba(r,g,b,alpha) string.
function hexToRgba(hex, alpha) {
  let h = String(hex || '').replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  const r = parseInt(h.slice(0, 2), 16) || 0;
  const g = parseInt(h.slice(2, 4), 16) || 0;
  const b = parseInt(h.slice(4, 6), 16) || 0;
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ============================================================================
   RENDER — MAIN ROUTER
   Different tab = different layout; we swap grid columns accordingly.
   ============================================================================ */
function renderMain() {
  const main = $('#main');
  main.innerHTML = '';

  if (state.activeTab === 'Guides') {
    main.style.gridTemplateColumns = '1fr';
    main.appendChild(renderGuides());
    return;
  }

  if (state.activeTab === 'Scrap') {
    main.style.gridTemplateColumns = '1fr';
    main.appendChild(renderComingSoon(state.activeTab));
    return;
  }

  // NCRs and NCOs — full 3-column UI (same builder, different tag.type)
  main.style.gridTemplateColumns = '250px minmax(0, 1fr) 500px';
  main.appendChild(renderSidebar());
  main.appendChild(renderBuilder());
  main.appendChild(renderPreview());
}

// Map active tab → tag.type ("NCR" or "NCO")
function currentTagType() {
  return state.activeTab === 'NCOs' ? 'NCO' : 'NCR';
}

function renderComingSoon(label) {
  return el('section', { class: 'coming-soon' }, [
    el('h2', {}, label + ' — Coming Soon'),
    el('p', {}, 'This section will get its own builder when the team finalizes the format.'),
    el('p', { style: 'font-size:12px;max-width:400px' },
       'For now, all tags live under NCRs. Switch tabs above to keep working.')
  ]);
}

/* ============================================================================
   RENDER — SIDEBAR (saved templates + import/export)
   ============================================================================ */
function renderSidebar() {
  const wrap = el('aside', { class: 'sidebar' });

  // Search + New template
  const head = el('div', { class: 'sidebar-head' });
  const search = el('input', {
    class: 'search', type: 'search',
    placeholder: state.activeTab === 'NCOs' ? 'Search NCO tags and caret templates…' : 'Search templates…',
    value: state.search,
    oninput: e => { state.search = e.target.value; replaceTemplateList(); }
  });
  head.appendChild(search);
  head.appendChild(el('button', {
    class: 'btn btn-primary btn-block',
    onclick: () => {
      state.current = blankTagForType(currentTagType());
      state.selectedId = null;
      state.selectedCarrotId = null;
      state.previewSuppressed = false;
      state.carrotPreviewSuppressed = false;
      renderAll();
    }
  }, '+ New Tag (Clear Forms)'));

  wrap.appendChild(head);

  // Template list (separate function so we can re-render only this on search)
  const list = el('div', { class: 'tag-list', id: 'tagList' });
  list.appendChild(buildTemplateList());
  wrap.appendChild(list);

  // Import / Export
  const foot = el('div', { class: 'sidebar-foot' });
  foot.appendChild(el('button', {
    class: 'btn btn-ghost', onclick: () => $('#fileImport').click()
  }, 'Import'));
  foot.appendChild(el('button', {
    class: 'btn btn-ghost', onclick: exportAll
  }, 'Export'));
  wrap.appendChild(foot);

  return wrap;
}

function buildTemplateList() {
  const frag = document.createDocumentFragment();
  const q = state.search.trim().toLowerCase();
  const expectedType = currentTagType();

  const visible = state.templates
    .filter(t => (t.type || 'NCR') === expectedType)
    .filter(t => !q || textIndex(t).includes(q))
    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

  if (state.activeTab !== 'NCOs') {
    if (visible.length === 0) {
      frag.appendChild(el('div', { class: 'empty-state' },
        state.search
          ? 'No matches'
          : 'No templates yet — fill one out and hit Save.'));
      return frag;
    }
    visible.forEach(t => frag.appendChild(renderTemplateCard(t, expectedType)));
    return frag;
  }

  const carrotVisible = state.carrotTemplates
    .filter(t => !q || carrotTextIndex(t).includes(q))
    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

  frag.appendChild(renderSidebarGroup(
    'NCO Tags',
    visible,
    state.search ? 'No matching NCO tags' : 'No NCO tags yet — fill one out and hit Save.',
    t => renderTemplateCard(t, expectedType)
  ));
  frag.appendChild(renderSidebarGroup(
    'Caret Templates',
    carrotVisible,
    state.search ? 'No matching caret templates' : 'No caret templates yet — save one from the Caret section.',
    renderCarrotTemplateCard
  ));

  return frag;
}

function renderSidebarGroup(title, items, emptyMessage, renderItem) {
  const group = el('div', { class: 'tag-list-group' });
  group.appendChild(el('div', { class: 'tag-list-group-title' }, title));
  if (items.length === 0) {
    group.appendChild(el('div', { class: 'tag-list-group-empty' }, emptyMessage));
    return group;
  }
  items.forEach(item => group.appendChild(renderItem(item)));
  return group;
}

function renderTemplateCard(t, expectedType) {
  const card = el('div', {
    class: 'tag-card' + (state.selectedId === t.id ? ' active' : ''),
    onclick: () => {
      if (state.selectedId === t.id) {
        state.previewSuppressed = !state.previewSuppressed;
        renderAll();
        return;
      }
      state.current = clone(t);
      state.selectedId = t.id;
      state.selectedCarrotId = t.carrotTemplateId || null;
      state.previewSuppressed = false;
      state.carrotPreviewSuppressed = false;
      renderAll();
    }
  });
  card.appendChild(el('div', { class: 'tag-card-title' },
    t.templateName || tagSummary(t) || 'Untitled'));
  card.appendChild(el('div', { class: 'tag-card-meta' },
    `${t.type || expectedType} template • ${formatDate(t.updatedAt || t.createdAt || Date.now())}`));

  const actions = el('div', { class: 'tag-card-actions' });
  actions.appendChild(el('button', {
    class: 'tag-action',
    title: 'Rename template',
    onclick: e => {
      e.stopPropagation();
      renameTemplate(t.id);
    }
  }, '✎'));
  actions.appendChild(el('button', {
    class: 'tag-action delete',
    title: 'Delete template',
    html: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>',
    onclick: e => {
      e.stopPropagation();
      confirmTemplateDelete(t.id);
    }
  }));
  card.appendChild(actions);

  attachHoverPreview(card, t);
  return card;
}

function renderCarrotTemplateCard(t) {
  const isActive = state.selectedCarrotId === t.id && !state.carrotPreviewSuppressed;
  const card = el('div', {
    class: 'tag-card' + (isActive ? ' active' : ''),
    onclick: () => {
      if (state.selectedCarrotId === t.id) {
        state.current.carrotTemplateId = t.id;
        state.current.carrotTemplateName = state.current.carrotTemplateName || t.name || '';
        state.carrotPreviewSuppressed = !state.carrotPreviewSuppressed;
        renderAll();
        return;
      }
      state.selectedCarrotId = t.id;
      state.current.carrotTemplateId = t.id;
      state.current.carrotTemplateName = t.name || '';
      state.current.carrotsText = t.text || '';
      state.carrotPreviewSuppressed = false;
      renderAll();
    }
  });
  card.appendChild(el('div', { class: 'tag-card-title' }, t.name || 'Untitled'));
  card.appendChild(el('div', { class: 'tag-card-meta' },
    `Caret template • ${formatDate(t.updatedAt || t.createdAt || Date.now())}`));

  const actions = el('div', { class: 'tag-card-actions' });
  actions.appendChild(el('button', {
    class: 'tag-action',
    title: 'Rename caret template',
    onclick: e => {
      e.stopPropagation();
      renameCarrotTemplate(t.id);
    }
  }, '✎'));
  actions.appendChild(el('button', {
    class: 'tag-action delete',
    title: 'Delete caret template',
    html: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>',
    onclick: e => {
      e.stopPropagation();
      confirmCarrotTemplateDelete(t.id);
    }
  }));
  card.appendChild(actions);
  attachHoverPreview(card, caretTemplatePreviewTag(t));
  return card;
}

function caretTemplatePreviewTag(t) {
  const preview = blankTagForType('NCO');
  preview.carrotTemplateName = t.name || '';
  preview.carrotsText = t.text || '';
  return preview;
}

// Returns true if a tag's updatedAt falls inside the chosen filter window.
function inDateRange(t, filter) {
  if (filter === 'all') return true;
  const day = 24 * 60 * 60 * 1000;
  const windows = { today: day, week: 7 * day, month: 30 * day };
  return Date.now() - t.updatedAt < windows[filter];
}

// Replace just the list when search changes — keeps focus on the search box.
function replaceTemplateList() {
  const list = $('#tagList');
  if (!list) return;
  list.innerHTML = '';
  list.appendChild(buildTemplateList());
}

function textIndex(t) {
  // Searchable string for a tag — combine all text fields.
  const parts = [
    t.templateName,
    ...(t.drawings || []).flatMap(d => [d.number, d.sheet, d.rev, d.location, d.custom, d.type]),
    ...(t.processSpecs || []).flatMap(s => [s.number, s.section, s.rev]),
    ...(t.items || []).flatMap(i => [
      i.partNumber, i.description, i.discrepancy,
      i.measCustom, i.sbText
    ]),
    t.lso, t.lio,
    t.carrotTemplateName, t.carrotsText
  ];
  return parts.filter(Boolean).join(' ').toLowerCase();
}

function carrotTextIndex(t) {
  return [t.name, t.text].filter(Boolean).join(' ').toLowerCase();
}

function tagSummary(t) {
  const item = t.items && t.items[0];
  const draw = t.drawings && t.drawings[0];
  if (item && item.partNumber) return `${item.partNumber} ${item.description || ''}`.trim();
  if (draw && (draw.number || draw.location)) return draw.number || draw.location;
  return 'Untitled';
}

/* ============================================================================
   RENDER — BUILDER (the form)
   ============================================================================ */
function renderBuilder() {
  const t = state.current;
  const wrap = el('section', { class: 'builder' });

  // Header
  const head = el('div', { class: 'builder-head' });
  const titleWrap = el('div', { class: 'builder-title-wrap' });
  titleWrap.appendChild(el('div', { class: 'builder-title' },
    state.selectedId ? 'Edit Template' : ('New ' + currentTagType() + ' Template')));
  if (['NCRs', 'NCOs'].includes(state.activeTab)) {
    titleWrap.appendChild(el('input', {
      class: 'builder-title-input',
      type: 'text',
      value: t.templateName || '',
      placeholder: 'Template Name',
      'aria-label': 'Template Name',
      oninput: e => { t.templateName = e.target.value; }
    }));
  }
  head.appendChild(titleWrap);

  const actions = el('div', { class: 'builder-actions' });
  actions.appendChild(el('button', {
    class: 'btn btn-ghost',
    onclick: duplicateTemplate,
    title: '⌘D'
  }, 'Duplicate'));
  if (state.selectedId) {
    actions.appendChild(el('button', {
      class: 'btn btn-ghost btn-danger',
      onclick: () => confirmTemplateDelete(state.selectedId)
    }, 'Delete'));
  }
  actions.appendChild(el('button', {
    class: 'btn btn-primary',
    onclick: saveTemplate,
    title: '⌘S'
  }, 'Save Template'));
  head.appendChild(actions);
  wrap.appendChild(head);

  if (state.activeTab !== 'NCOs') {
    wrap.appendChild(el('div', { class: 'builder-divider', 'aria-hidden': 'true' }));
  }

  // ----- Header / Revision section -----
  const revSec = section('Header');
  const revRow = el('div', { class: 'row' });
  revRow.appendChild(field('Revision #', 'number', t.revisionNumber,
    v => { t.revisionNumber = parseInt(v) || 0; updatePreview(); }, { min: 0 }));
  revSec.appendChild(revRow);
  wrap.appendChild(revSec);

  // ----- Drawings -----
  const drawSec = section('Drawings');
  t.drawings.forEach((d, i) => drawSec.appendChild(renderDrawing(d, i)));
  drawSec.appendChild(el('button', {
    class: 'add-btn',
    onclick: () => openDrawingTypeModal(type => {
      t.drawings.push({ type, custom: '', number: '', sheet: '', rev: '', location: '' });
      renderAll();
    })
  }, '+ Add drawing'));
  wrap.appendChild(drawSec);

  // ----- Process Specs -----
  const specSec = section('Process Specs');
  t.processSpecs.forEach((s, i) => specSec.appendChild(renderSpec(s, i)));
  specSec.appendChild(el('button', {
    class: 'add-btn',
    onclick: () => { t.processSpecs.push({ number: '', section: '', rev: '' }); renderAll(); }
  }, '+ Add process spec'));
  wrap.appendChild(specSec);

  // ----- Items -----
  const itemSec = section('Items');
  t.items.forEach((it, i) => itemSec.appendChild(renderItem(it, i)));
  itemSec.appendChild(el('button', {
    class: 'add-btn',
    onclick: () => { t.items.push(blankItem(t.items.length + 1)); renderAll(); }
  }, '+ Add item'));
  wrap.appendChild(itemSec);

  // ----- Footer -----
  const footSec = section('Footer');
  const footRow = el('div', { class: 'row row-2' });
  footRow.appendChild(field('LSO - Last Shop Operation', 'text', t.lso,
    v => { t.lso = v; updatePreview(); }, { placeholder: '100/010' }));
  footRow.appendChild(field('LIO - Last Inspection Operation', 'text', t.lio,
    v => { t.lio = v; updatePreview(); }, { placeholder: '110/010' }));
  footSec.appendChild(footRow);

  const attRow = el('div', { class: 'row row-att' });
  const attLabel = el('label', { style: 'display:flex;gap:6px;align-items:center;font-size:12px;color:var(--text-muted);padding-bottom:8px' });
  const cb = el('input', {
    type: 'checkbox',
    onchange: e => { t.attachmentsEnabled = e.target.checked; updatePreview(); }
  });
  if (t.attachmentsEnabled) cb.checked = true;
  attLabel.appendChild(cb);
  attLabel.appendChild(document.createTextNode(' Include attachments line'));
  attRow.appendChild(attLabel);
  attRow.appendChild(field('Attachments text', 'text', t.attachmentsText,
    v => { t.attachmentsText = v; updatePreview(); }, { placeholder: '*See Attachments*' }));
  footSec.appendChild(attRow);
  wrap.appendChild(footSec);

  if (state.activeTab === 'NCOs') {
    wrap.appendChild(el('div', { class: 'builder-divider', 'aria-hidden': 'true' }));
    wrap.appendChild(renderCarrotsSection(t));
  }

  return wrap;
}

// Helper to build a section card with a title.
function section(title) {
  const sec = el('div', { class: 'section' });
  sec.appendChild(el('div', { class: 'section-head' }, [
    el('div', { class: 'section-title' }, title)
  ]));
  return sec;
}

// Generic input field — labeled input with an oninput callback.
function field(labelText, type, value, onInput, extra = {}) {
  const f = el('div', { class: 'field' });
  f.appendChild(el('label', {}, labelText));
  const input = el('input', {
    type, value: value ?? '',
    placeholder: extra.placeholder || '',
    min: extra.min, max: extra.max,
    oninput: e => onInput(e.target.value)
  });
  f.appendChild(input);
  return f;
}

// Multi-line field for longer text (discrepancy, S/B).
function textareaField(labelText, value, onInput, extra = {}) {
  const f = el('div', { class: 'field' });
  f.appendChild(el('label', {}, labelText));
  const ta = el('textarea', {
    class: extra.size === 'lg' ? 'lg' : null,
    placeholder: extra.placeholder || '',
    oninput: e => onInput(e.target.value)
  });
  ta.value = value || '';
  f.appendChild(ta);
  return f;
}

function formatMeasurementToken(value, suffix) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  if (/[′']$/.test(raw)) return `${raw.replace(/[′']$/, "'")}${suffix}`;
  if (/["″]$/.test(raw)) return `${raw.replace(/["″]$/, '"')}${suffix}`;
  return `${raw}"${suffix}`;
}

function renderCarrotsSection(t) {
  const sec = section('Caret');
  const title = sec.querySelector('.section-title');
  const head = sec.querySelector('.section-head');
  if (title) title.title = 'Custom Work Instructions';
  if (head) {
    head.classList.add('section-head-inline');
    head.appendChild(el('input', {
      class: 'section-head-input',
      type: 'text',
      value: t.carrotTemplateName || '',
      placeholder: 'Caret Template Title',
      'aria-label': 'Caret Template Name',
      oninput: e => { t.carrotTemplateName = e.target.value; }
    }));
    head.appendChild(el('button', {
      class: 'btn btn-primary',
      onclick: saveCarrotTemplate
    }, 'Save Caret Template'));
  }

  const f = el('div', { class: 'field' });
  f.appendChild(el('label', {}, 'Custom Work Instructions'));
  const ta = el('textarea', {
    placeholder: 'Paste or write text here...',
    style: 'min-height:180px;resize:vertical',
    oninput: e => {
      t.carrotsText = e.target.value;
      updatePreview();
    }
  });
  ta.value = t.carrotsText || '';
  f.appendChild(ta);
  sec.appendChild(f);
  return sec;
}

function renderDrawing(d, idx) {
  const t = state.current;
  const sub = el('div', { class: 'subsection' });
  const head = el('div', { class: 'subsection-head' });

  // Type select
  const typeSel = el('select', {
    onchange: e => { d.type = e.target.value; updatePreview(); renderAll(); }
  });
  ['Engineering', 'Tool', 'Supplier', 'Other'].forEach(opt => {
    const o = el('option', { value: opt }, opt + ' Drawing');
    if (d.type === opt) o.selected = true;
    typeSel.appendChild(o);
  });
  head.appendChild(typeSel);

  // Show Remove on every drawing as long as we have at least one to fall back on
  if (t.drawings.length > 1) {
    head.appendChild(el('button', {
      class: 'del-btn',
      onclick: () => { t.drawings.splice(idx, 1); renderAll(); }
    }, 'Remove'));
  }
  sub.appendChild(head);

  if (d.type === 'Other') {
    sub.appendChild(field('Custom label', 'text', d.custom,
      v => { d.custom = v; updatePreview(); },
      { placeholder: 'Vendor' }));
    sub.appendChild(field('Location', 'text', d.location || d.number,
      v => {
        d.location = v;
        d.number = '';
        d.sheet = '';
        d.rev = '';
        updatePreview();
      },
      { placeholder: 'TWMetals' }));
    return sub;
  }

  const row = el('div', { class: 'row row-3' });
  row.appendChild(field('Number', 'text', d.number,
    v => { d.number = v; updatePreview(); }, { placeholder: '123A1234' }));
  row.appendChild(field('Sheet', 'text', d.sheet,
    v => { d.sheet = v; updatePreview(); }, { placeholder: '1' }));
  row.appendChild(field('Rev', 'text', d.rev,
    v => { d.rev = v; updatePreview(); }, { placeholder: 'A' }));
  sub.appendChild(row);
  return sub;
}

function renderSpec(s, idx) {
  const t = state.current;
  const sub = el('div', { class: 'subsection' });
  const head = el('div', { class: 'subsection-head' });
  head.appendChild(el('div', { class: 'subsection-title' },
    'Process Spec ' + (idx + 1) + (idx === 0 ? '  (used in S/B references)' : '')));
  if (t.processSpecs.length > 1) {
    head.appendChild(el('button', {
      class: 'del-btn',
      onclick: () => { t.processSpecs.splice(idx, 1); renderAll(); }
    }, 'Remove'));
  }
  sub.appendChild(head);

  const row = el('div', { class: 'row row-3' });
  row.appendChild(field('Number', 'text', s.number,
    v => { s.number = v; updatePreview(); }, { placeholder: 'BAC1234' }));
  row.appendChild(field('Section', 'text', s.section,
    v => { s.section = v; updatePreview(); }, { placeholder: '11.1a' }));
  row.appendChild(field('Rev', 'text', s.rev,
    v => { s.rev = v; updatePreview(); }, { placeholder: 'A' }));
  sub.appendChild(row);
  return sub;
}

function renderItem(it, idx) {
  const t = state.current;
  const sub = el('div', { class: 'subsection' });
  const head = el('div', { class: 'subsection-head' });
  const titleWrap = el('div', { class: 'subsection-title-wrap' });
  titleWrap.appendChild(el('div', { class: 'subsection-title' }, 'Item'));
  titleWrap.appendChild(el('input', {
    class: 'subsection-mini-input',
    type: 'text',
    value: it.itemNumber || String(idx + 1),
    'aria-label': `Item number ${idx + 1}`,
    oninput: e => { it.itemNumber = e.target.value; updatePreview(); }
  }));
  head.appendChild(titleWrap);
  if (t.items.length > 1) {
    head.appendChild(el('button', {
      class: 'del-btn',
      onclick: () => { t.items.splice(idx, 1); renderAll(); }
    }, 'Remove'));
  }
  sub.appendChild(head);

  // Bad parts / Total quantity
  const cnt = el('div', { class: 'row row-2' });
  cnt.appendChild(field('Bad Parts', 'text', it.countOf,
    v => { it.countOf = v; updatePreview(); }, { placeholder: '1' }));
  cnt.appendChild(field('Total Quantity', 'text', it.countTotal,
    v => { it.countTotal = v; updatePreview(); }, { placeholder: '8' }));
  sub.appendChild(cnt);

  // Part number + description
  const part = el('div', { class: 'row row-2' });
  part.appendChild(field('Part Number', 'text', it.partNumber,
    v => { it.partNumber = v; updatePreview(); }, { placeholder: '123Q1234-1' }));
  part.appendChild(field('Item Description', 'text', it.description,
    v => { it.description = v; updatePreview(); }, { placeholder: 'Tube Assy' }));
  sub.appendChild(part);

  // Discrepancy
  const discGroup = el('div', { class: 'inner-group' });
  discGroup.appendChild(el('div', { class: 'inner-group-title' }, 'Discrepancy'));
  const discTa = el('textarea', {
    class: 'lg',
    placeholder: 'has a sharp dent C/T the AS56942 Fitting',
    oninput: e => { it.discrepancy = e.target.value; updatePreview(); }
  });
  discTa.value = it.discrepancy || '';
  discGroup.appendChild(discTa);
  sub.appendChild(discGroup);

  // Measurements (L/W/D)
  const measGroup = el('div', { class: 'inner-group' });
  measGroup.appendChild(el('div', { class: 'inner-group-title' }, 'Measurements'));
  const meas = el('div', { class: 'row row-3 lwd-row' });
  meas.appendChild(field('Length (L)', 'text', it.measL,
    v => { it.measL = v; updatePreview(); }, { placeholder: '0.172' }));
  meas.appendChild(field('Width (W)', 'text', it.measW,
    v => { it.measW = v; updatePreview(); }, { placeholder: '0.086' }));
  meas.appendChild(field('Depth (D)', 'text', it.measD,
    v => { it.measD = v; updatePreview(); }, { placeholder: '0.007' }));
  measGroup.appendChild(meas);
  sub.appendChild(measGroup);

  // Defect Description Other (sibling of Measurements, not nested)
  const customBox = el('div', { class: 'inner-group' });
  customBox.appendChild(el('div', { class: 'inner-group-title' }, 'Defect Description Other'));
  const customTa = el('textarea', {
    class: 'tall',
    placeholder: 'is missing alodine C/T the 123A4321-1 Flange',
    oninput: e => { it.measCustom = e.target.value; updatePreview(); }
  });
  customTa.value = it.measCustom || '';
  customBox.appendChild(customTa);
  sub.appendChild(customBox);

  // S/B (What the Spec says it should be)
  sub.appendChild(textareaField('S/B (What the Spec says it should be)', it.sbText,
    v => { it.sbText = v; updatePreview(); }, { placeholder: 'No dents on the tube' }));
  const sbToggle = el('label', {
    style: 'display:flex;gap:6px;align-items:center;font-size:12px;color:var(--text-muted);margin-top:4px'
  });
  const sbCb = el('input', {
    type: 'checkbox',
    onchange: e => { it.sbAutoRef = e.target.checked; updatePreview(); }
  });
  if (it.sbAutoRef !== false) sbCb.checked = true;
  sbToggle.appendChild(sbCb);
  sbToggle.appendChild(document.createTextNode(' Auto-reference first process spec'));
  sub.appendChild(sbToggle);

  return sub;
}

/* ============================================================================
   RENDER — PREVIEW
   ============================================================================ */
function renderPreview() {
  const wrap = el('aside', { class: 'preview-pane' });

  const head = el('div', { class: 'preview-head' });
  head.appendChild(el('div', { class: 'preview-title' }, 'Live Preview'));
  head.appendChild(el('div', { class: 'tag-card-meta' },
    'Type: ' + (state.current.type || 'NCR')));
  wrap.appendChild(head);

  const body = el('div', { class: 'preview-body' });
  const card = el('div', {
    class: 'preview-card'
      + (state.formattedPreview ? ' formatted-preview' : '')
      + (state.uppercaseText ? ' uppercase-text' : ''),
    id: 'previewCard'
  });
  card.innerHTML = currentPreviewHTML();
  body.appendChild(card);
  wrap.appendChild(body);

  const foot = el('div', { class: 'preview-foot' });
  foot.appendChild(el('button', {
    class: 'btn btn-primary btn-block', onclick: copyPreview, title: '⌘Enter'
  }, '📋 Copy to clipboard'));
  wrap.appendChild(foot);

  return wrap;
}

// Lightweight update — only the preview text, keeps form focus intact.
function updatePreview() {
  const c = $('#previewCard');
  if (c) {
    c.classList.toggle('formatted-preview', state.formattedPreview);
    c.classList.toggle('uppercase-text', state.uppercaseText);
    c.innerHTML = currentPreviewHTML();
  }
}

function currentPreviewHTML() {
  if (state.selectedId && state.previewSuppressed) {
    return `<span class="preview-placeholder">Click the selected template again to show its preview.</span>`;
  }
  return previewHTML(state.current);
}

function isCaretPreviewSuppressed(t = state.current) {
  if (t.type !== 'NCO' || !state.carrotPreviewSuppressed || !state.selectedCarrotId) {
    return false;
  }
  return !t.carrotTemplateId || t.carrotTemplateId === state.selectedCarrotId;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>]/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[ch]));
}

function joinPreviewTokens(tokens) {
  return tokens
    .map(token => token == null ? '' : String(token))
    .map(token => token.trim())
    .filter(token => token !== '')
    .join(' ')
    .trim();
}

function hasPreviewInput(t) {
  return (
    (t.revisionNumber || 0) > 0 ||
    (t.drawings || []).some(d => d.number || d.sheet || d.rev || d.location || d.custom) ||
    (t.processSpecs || []).some(s => s.number || s.section || s.rev) ||
    (t.items || []).some(i =>
      i.countOf || i.countTotal || i.partNumber || i.description ||
      i.discrepancy || i.measL || i.measW || i.measD ||
      i.measCustom || i.sbText
    ) ||
    t.lso || t.lio || t.carrotsText
  );
}

function buildPreviewBlocks(t) {
  const blocks = [];

  if (t.revisionNumber > 0) {
    blocks.push({ type: 'emphasis', lines: [`*Revision ${t.revisionNumber}*`] });
    blocks.push({ type: 'spacer' });
  }

  (t.drawings || []).forEach(d => {
    if (d.type === 'Other') {
      const text = joinPreviewTokens([d.location || d.number || '']);
      if (!text) return;
      blocks.push({
        type: 'inline',
        className: 'lbl',
        label: `${d.custom || 'Other Drawing'}:`,
        text
      });
      return;
    }
    if (!d.number && !d.sheet && !d.rev) return;
    const label =
      d.type === 'Engineering' ? 'Eng. Drawing' :
      d.type === 'Tool'        ? 'Tool Drawing' :
      d.type === 'Supplier'    ? 'Supplier Drawing' :
      (d.custom || 'Other Drawing');
    const text = joinPreviewTokens([
      d.number,
      d.sheet ? `Sht.${d.sheet}` : '',
      d.rev ? `Rev.${d.rev}` : ''
    ]);
    blocks.push({ type: 'inline', className: 'lbl', label: `${label}:`, text });
  });

  (t.processSpecs || []).forEach(p => {
    if (!p.number && !p.section && !p.rev) return;
    const text = joinPreviewTokens([
      p.number,
      p.section ? `Sec.${p.section}` : '',
      p.rev ? `Rev.${p.rev}` : ''
    ]);
    blocks.push({ type: 'inline', className: 'lbl', label: 'Process Spec:', text });
  });

  (t.items || []).forEach((it, i) => {
    const hasContent =
      it.countOf || it.countTotal ||
      it.partNumber || it.description || it.discrepancy ||
      it.measL || it.measW || it.measD ||
      it.measCustom || it.sbText;
    if (!hasContent) return;

    if (blocks.length) blocks.push({ type: 'spacer' });

    const headerHasContent =
      it.countOf || it.countTotal ||
      it.partNumber || it.description || it.discrepancy;
    if (headerHasContent) {
      const countPart = (it.countOf || it.countTotal)
        ? `${it.countOf || ''} of ${it.countTotal || ''}`
        : '';
      const text = joinPreviewTokens([
        countPart,
        it.partNumber,
        it.description,
        it.discrepancy
      ]);
      blocks.push({
        type: 'inline',
        className: 'item-hdr',
        label: `Item ${it.itemNumber || String(i + 1)}:`,
        text
      });
    }

    if (it.measL || it.measW || it.measD) {
      const parts = [];
      if (it.measL) parts.push(formatMeasurementToken(it.measL, 'L'));
      if (it.measW) parts.push(formatMeasurementToken(it.measW, 'W'));
      if (it.measD) parts.push(formatMeasurementToken(it.measD, 'D'));
      blocks.push({ type: 'spacer' });
      blocks.push({ type: 'heading', className: 'meas-hdr', label: 'Measurements:' });
      blocks.push({ type: 'text', text: parts.join(' x ') });
    }

    if (it.measCustom) {
      blocks.push({ type: 'spacer' });
      blocks.push({ type: 'multiline', lines: String(it.measCustom).split('\n') });
    }

    if (it.sbText) {
      let ref = '';
      if (it.sbAutoRef !== false) {
        const firstSpec = t.processSpecs[0];
        if (firstSpec && (firstSpec.number || firstSpec.section || firstSpec.rev)) {
          ref = ` per ${firstSpec.number || ''}`;
          if (firstSpec.section) ref += ` Sec.${firstSpec.section}`;
          if (firstSpec.rev) ref += ` Rev.${firstSpec.rev}`;
        }
      }
      blocks.push({ type: 'spacer' });
      blocks.push({
        type: 'inline',
        className: 'lbl',
        label: 'S/B:',
        text: `${it.sbText}${ref}`
      });
    }
  });

  if (t.lso || t.lio) {
    blocks.push({ type: 'spacer' });
    if (t.lso) blocks.push({ type: 'inline', className: 'lbl', label: 'LSO:', text: t.lso });
    if (t.lio) blocks.push({ type: 'inline', className: 'lbl', label: 'LIO:', text: t.lio });
  }

  if (t.attachmentsEnabled && t.attachmentsText) {
    blocks.push({ type: 'spacer' });
    blocks.push({ type: 'emphasis', lines: String(t.attachmentsText).split('\n') });
  }

  if (t.type === 'NCO' && t.carrotsText && !isCaretPreviewSuppressed(t)) {
    blocks.push({ type: 'spacer' });
    blocks.push({ type: 'multiline', lines: String(t.carrotsText).split('\n') });
  }

  return blocks;
}

function renderPreviewRichText(text) {
  return escapeHtml(text).replace(/\*([^*]+)\*/g, '<em>*$1*</em>');
}

const FORMATTED_PREVIEW_WIDTH = 51;

function renderPreviewClassic(blocks) {
  const lines = [];
  blocks.forEach(block => {
    if (block.type === 'spacer') {
      lines.push('');
      return;
    }
    if (block.type === 'inline') {
      const labelClass = block.className || 'lbl';
      const label = `<span class="${labelClass}">${escapeHtml(block.label)}</span>`;
      lines.push(joinPreviewTokens([label, block.text]));
      return;
    }
    if (block.type === 'heading') {
      lines.push(`<span class="${block.className || 'meas-hdr'}">${escapeHtml(block.label)}</span>`);
      return;
    }
    if (block.type === 'text') {
      lines.push(escapeHtml(block.text));
      return;
    }
    if (block.type === 'multiline') {
      block.lines.forEach(line => lines.push(escapeHtml(line)));
      return;
    }
    if (block.type === 'emphasis') {
      block.lines.forEach(line => lines.push(renderPreviewRichText(line)));
    }
  });
  return lines.join('\n');
}

function wrapIndentedText(text, firstIndent, nextIndent, width = FORMATTED_PREVIEW_WIDTH) {
  const source = String(text || '');
  if (!source.trim()) return [firstIndent.trimEnd()];

  const parts = source.match(/\S+\s*|\s+/g) || [];
  const lines = [];
  let current = firstIndent;

  parts.forEach(part => {
    if (current === firstIndent || current === nextIndent) {
      current += part.replace(/^\n+|\n+$/g, '');
      return;
    }
    if ((current + part).length <= width) {
      current += part;
      return;
    }
    lines.push(current.trimEnd());
    current = nextIndent + part.replace(/^\s+/, '');
  });

  lines.push(current.trimEnd());
  return lines;
}

function wrapPlainText(text, width = FORMATTED_PREVIEW_WIDTH) {
  return wrapIndentedText(text, '', '', width).map(line => line.trimEnd());
}

function renderFormattedInlineBlock(block) {
  const labelText = String(block.label || '');
  const firstIndent = labelText + ' ';
  const nextIndent = ' '.repeat(firstIndent.length);
  const lines = wrapIndentedText(block.text, firstIndent, nextIndent);
  return lines.map((line, idx) => {
    if (idx !== 0) return escapeHtml(line);
    return `<span class="${block.className || 'lbl'} preview-inline-label">${escapeHtml(labelText)}</span> ${escapeHtml(line.slice(firstIndent.length))}`;
  });
}

function renderPreviewFormatted(blocks) {
  const lines = [];

  blocks.forEach(block => {
    if (block.type === 'spacer') {
      lines.push('');
      return;
    }
    if (block.type === 'inline') {
      renderFormattedInlineBlock(block).forEach(line => lines.push(line));
      return;
    }
    if (block.type === 'heading') {
      wrapPlainText(block.label).forEach((line, idx) => {
        if (idx === 0) lines.push(`<span class="${block.className || 'meas-hdr'}">${escapeHtml(line)}</span>`);
        else lines.push(escapeHtml(line));
      });
      return;
    }
    if (block.type === 'text') {
      wrapPlainText(block.text).forEach(line => lines.push(escapeHtml(line)));
      return;
    }
    if (block.type === 'multiline') {
      block.lines.forEach(line => wrapPlainText(line).forEach(wrapped => lines.push(escapeHtml(wrapped))));
      return;
    }
    if (block.type === 'emphasis') {
      block.lines.forEach(line => wrapPlainText(line).forEach(wrapped => lines.push(renderPreviewRichText(wrapped))));
    }
  });

  return lines.join('\n');
}

function previewText(blocks) {
  if (state.formattedPreview) {
    const lines = [];

    blocks.forEach(block => {
      if (block.type === 'spacer') {
        lines.push('');
        return;
      }
      if (block.type === 'inline') {
        const firstIndent = String(block.label || '') + ' ';
        const nextIndent = ' '.repeat(firstIndent.length);
        wrapIndentedText(block.text, firstIndent, nextIndent).forEach(line => lines.push(line));
        return;
      }
      if (block.type === 'heading') {
        wrapPlainText(block.label).forEach(line => lines.push(line));
        return;
      }
      if (block.type === 'text') {
        wrapPlainText(block.text).forEach(line => lines.push(line));
        return;
      }
      if (block.type === 'multiline' || block.type === 'emphasis') {
        block.lines.forEach(line => wrapPlainText(line).forEach(wrapped => lines.push(wrapped)));
      }
    });

    return lines.join('\n');
  }

  const lines = [];
  blocks.forEach(block => {
    if (block.type === 'spacer') {
      lines.push('');
      return;
    }
    if (block.type === 'inline') {
      lines.push(joinPreviewTokens([block.label, block.text]));
      return;
    }
    if (block.type === 'heading') {
      lines.push(block.label);
      return;
    }
    if (block.type === 'text') {
      lines.push(String(block.text || ''));
      return;
    }
    if (block.type === 'multiline' || block.type === 'emphasis') {
      block.lines.forEach(line => lines.push(String(line || '')));
    }
  });
  return lines.join('\n');
}

// Build the preview text from current tag state. Output mirrors the user's
// example format exactly: Eng. Drawing line, Process Spec line, Item line(s),
// Measurements, S/B with auto-reference, LSO/LIO, attachments.
function previewHTML(t) {
  if (!hasPreviewInput(t)) {
    return `<span class="preview-placeholder">Start typing to show live preview.</span>`;
  }
  const blocks = buildPreviewBlocks(t);
  return state.formattedPreview ? renderPreviewFormatted(blocks) : renderPreviewClassic(blocks);
}

// Plain text for the clipboard.
function previewPlainText(t) {
  const text = hasPreviewInput(t)
    ? previewText(buildPreviewBlocks(t))
    : 'Start typing to show live preview.';
  return state.uppercaseText ? text.toUpperCase() : text;
}

function copyPreview() {
  const text = previewPlainText(state.current);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => toast('Copied to clipboard'),
      () => fallbackCopy(text)
    );
  } else fallbackCopy(text);
}

function fallbackCopy(text) {
  // For older browsers / restricted environments. Uses a hidden textarea.
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast('Copied to clipboard'); }
  catch (e) { toast('Copy failed — select & copy manually'); }
  ta.remove();
}

/* ============================================================================
   ACTIONS — save / duplicate / delete / rename templates
   ============================================================================ */
function saveTemplate() {
  const t = state.current;
  const name = (t.templateName || '').trim();
  if (!name) {
    toast('Name the template first');
    return;
  }

  openModal('Save template', [
    el('div', {
      class: 'field-hint',
      style: 'white-space:normal;line-height:1.5'
    }, `Do you want to create a new template named "${name}" or update the current template?`)
  ], [
    el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
    el('button', {
      class: 'btn btn-primary',
      onclick: createNewTemplate
    }, 'Create New'),

function prepareCurrentTemplateForSave() {
  const t = state.current;
  const name = (t.templateName || '').trim();
  if (!name) {
    toast('Name the template first');
    return null;
  }

  t.templateName = name;
  t.type = currentTagType();
  t.carrotTemplateId = state.activeTab === 'NCOs' ? (state.selectedCarrotId || null) : null;
  t.createdAt = t.createdAt || Date.now();
  t.updatedAt = Date.now();
  return t;
}

function updateCurrentTemplate() {
  const t = prepareCurrentTemplateForSave();
  if (!t) return;
  const idx = state.templates.findIndex(x => x.id === t.id);
  if (idx >= 0) state.templates[idx] = clone(t);
  else state.templates.unshift(clone(t));
  state.selectedId = t.id;
  closeModal();
  persist();
  toast(idx >= 0 ? 'Template updated' : 'Template saved');
  renderAll();
}

function createNewTemplate() {
  const t = prepareCurrentTemplateForSave();
  if (!t) return;

  const fresh = clone(t);
  fresh.id = blankTagForType(currentTagType()).id;
  fresh.createdAt = Date.now();
  fresh.updatedAt = Date.now();
  state.templates.unshift(clone(fresh));
  state.current = fresh;
  state.selectedId = fresh.id;
  state.previewSuppressed = false;
  state.carrotPreviewSuppressed = false;
  closeModal();
  persist();
  toast('Template created');
  renderAll();
}

function saveCarrotTemplate() {
  if (state.activeTab !== 'NCOs') return;
  const name = (state.current.carrotTemplateName || '').trim();
  const text = state.current.carrotsText || '';
  if (!name) {
    toast('Name the caret template first');
    return;
  }
  if (!text.trim()) {
    toast('Add caret text first');
    return;
  }

  const id = state.selectedCarrotId || ('carrot_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6));
  const next = {
    id,
    name,
    text,
    createdAt: state.carrotTemplates.find(x => x.id === id)?.createdAt || Date.now(),
    updatedAt: Date.now()
  };
  const idx = state.carrotTemplates.findIndex(x => x.id === id);
  if (idx >= 0) state.carrotTemplates[idx] = next;
  else state.carrotTemplates.unshift(next);
  state.selectedCarrotId = id;
  state.current.carrotTemplateId = id;
  state.current.carrotTemplateName = name;
  persist();
  toast(idx >= 0 ? 'Caret template updated' : 'Caret template saved');
  renderAll();
}

/* ============================================================================
   IMPORT / EXPORT JSON — for moving tags between machines
   ============================================================================ */
function exportAll() {
  const data = {
    version: 1,
    savedAt: new Date().toISOString(),
    tags: state.tags,
    templates: state.templates,
    carrotTemplates: state.carrotTemplates
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = el('a', { href: url, download: 'tag-builder-' + Date.now() + '.json' });
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Exported');
}

function importFile(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const incoming = data.tags || [];
      const incomingTpl = data.templates || [];
      const incomingCarrots = data.carrotTemplates || [];
      // Merge by id (incoming wins on conflict).
      const byId = new Map(state.tags.map(t => [t.id, t]));
      incoming.forEach(t => byId.set(t.id, t));
      state.tags = Array.from(byId.values());
      const tplById = new Map(state.templates.map(t => [t.id, t]));
      incomingTpl.forEach(t => tplById.set(t.id, t));
      state.templates = Array.from(tplById.values());
      const carrotById = new Map(state.carrotTemplates.map(t => [t.id, t]));
      incomingCarrots.forEach(t => carrotById.set(t.id, t));
      state.carrotTemplates = Array.from(carrotById.values());
      persist();
      toast(`Imported ${incoming.length} tags, ${incomingTpl.length} templates, and ${incomingCarrots.length} caret templates`);
      renderAll();
    } catch (err) {
      alert('Invalid JSON: ' + err.message);
    }
  };
  r.readAsText(file);
}

function isJsonFile(file) {
  if (!file) return false;
  const name = String(file.name || '').toLowerCase();
  return file.type === 'application/json' || name.endsWith('.json');
}

/* ============================================================================
   GUIDES TAB — multiple PDF tabs, loaded from disk via file picker
   PDFs persist for the session only (object URLs are not durable).
   Tip: keep your team's guides in a shared folder so anyone can pick the
   same files.
   ============================================================================ */
function renderGuides() {
  const wrap = el('section', { class: 'guides' });
  const tabs = el('div', { class: 'guides-tabs' });

  state.guides.forEach((g, i) => {
    const isActive = i === state.activeGuideIdx;
    const t = el('div', {
      class: 'guide-tab' + (isActive ? ' active' : ''),
      onclick: () => { state.activeGuideIdx = i; renderAll(); }
    });
    t.appendChild(document.createTextNode(g.name));
    t.appendChild(el('span', {
      class: 'x',
      onclick: e => {
        e.stopPropagation();
        URL.revokeObjectURL(state.guides[i].url);
        state.guides.splice(i, 1);
        if (state.activeGuideIdx >= state.guides.length)
          state.activeGuideIdx = Math.max(0, state.guides.length - 1);
        renderAll();
      }
    }, '×'));
    tabs.appendChild(t);
  });

  tabs.appendChild(el('button', {
    class: 'btn btn-ghost',
    onclick: () => $('#filePdf').click()
  }, '+ Add PDF'));
  wrap.appendChild(tabs);

  const view = el('div', { class: 'guide-viewer' });
  if (state.guides.length === 0) {
    view.appendChild(el('div', { class: 'empty-state' }, [
      el('h3', { style: 'margin-bottom:8px;color:var(--text);font-size:18px' }, 'Team Guides'),
      el('div', {}, 'Click "+ Add PDF" to load one or more PDFs from disk.'),
      el('div', { style: 'margin-top:12px;font-size:12px;max-width:480px;margin-left:auto;margin-right:auto' },
        'Tip: keep guides on a shared folder (OneDrive / SharePoint / network drive) so everyone picks the same source. PDFs aren\'t saved into this file — they load fresh each session.')
    ]));
  } else {
    const g = state.guides[state.activeGuideIdx];
    const frame = el('iframe', { src: g.url });
    // Make iframe fill remaining viewport height
    frame.style.height = 'calc(100vh - 130px)';
    view.appendChild(frame);
  }
  wrap.appendChild(view);
  return wrap;
}

/* ============================================================================
   GLOBAL EVENTS — theme toggle, file inputs, keyboard shortcuts
   ============================================================================ */
function setupGlobalEvents() {
  let dragDepth = 0;

  // Theme picker show/hide
  $('#themeBtn').addEventListener('click', e => {
    e.stopPropagation();
    $('#themePicker').classList.toggle('show');
  });
  document.addEventListener('click', e => {
    if (!$('#themePicker').contains(e.target) && e.target !== $('#themeBtn'))
      $('#themePicker').classList.remove('show');
  });
  $$('#themePicker .theme-opt[data-theme]').forEach(b => {
    b.addEventListener('click', e => {
      const sw = b.querySelector('.theme-swatch');
      const bg = sw ? sw.style.background : '';
      applyThemeWithRipple(b.dataset.theme, e.clientX, e.clientY, bg);
      $('#themePicker').classList.remove('show');
    });
  });
  $('#createThemeBtn').addEventListener('click', () => {
    $('#themePicker').classList.remove('show');
    openThemeBuilder(null);
  });
  renderCustomThemes();

  // Modal: backdrop click closes
  $('#modalBackdrop').addEventListener('click', e => {
    if (e.target === $('#modalBackdrop')) closeModal();
  });

  // Focus mode + uppercase text toggle
  $('#focusBtn').addEventListener('click', toggleFocusMode);
  $('#formatBtn').addEventListener('click', toggleFormattedPreview);
  $('#uppercaseBtn').addEventListener('click', toggleUppercaseText);
  if (state.formattedPreview) $('#formatBtn').classList.add('feature-on');
  if (state.uppercaseText) $('#uppercaseBtn').classList.add('feature-on');

  // Hidden file input is triggered from the sidebar Import button.
  $('#fileImport').addEventListener('change', e => {
    const f = e.target.files && e.target.files[0];
    if (f) importFile(f);
    e.target.value = '';
  });
  $('#filePdf').addEventListener('change', e => {
    const files = Array.from(e.target.files || []);
    files.forEach(f => state.guides.push({ name: f.name, url: URL.createObjectURL(f) }));
    if (files.length) state.activeGuideIdx = state.guides.length - files.length;
    e.target.value = '';
    renderAll();
  });

  function setDropOverlay(show) {
    document.body.classList.toggle('drag-importing', show);
    const overlay = $('#dropOverlay');
    if (overlay) overlay.setAttribute('aria-hidden', show ? 'false' : 'true');
  }
  function fileDragEvent(e) {
    return !!(e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files'));
  }

  document.addEventListener('dragenter', e => {
    if (!fileDragEvent(e)) return;
    e.preventDefault();
    dragDepth++;
    setDropOverlay(true);
  });
  document.addEventListener('dragover', e => {
    if (!fileDragEvent(e)) return;
    e.preventDefault();
    if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
    setDropOverlay(true);
  });
  document.addEventListener('dragleave', e => {
    if (!fileDragEvent(e)) return;
    dragDepth = Math.max(0, dragDepth - 1);
    if (dragDepth === 0) setDropOverlay(false);
  });
  document.addEventListener('drop', e => {
    if (!fileDragEvent(e)) return;
    e.preventDefault();
    dragDepth = 0;
    setDropOverlay(false);
    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    if (!isJsonFile(file)) {
      toast('Drop a JSON export file');
      return;
    }
    importFile(file);
  });

  // Keyboard shortcuts (works great with BetterTouchTool gestures too):
  //   ⌘/Ctrl + S      Save
  //   ⌘/Ctrl + D      Duplicate current tag
  //   ⌘/Ctrl + Enter  Copy preview to clipboard
  document.addEventListener('keydown', e => {
    const meta = e.metaKey || e.ctrlKey;
    // ⌘. — focus mode (works on any tab)
    if (meta && e.key === '.') { e.preventDefault(); toggleFocusMode(); return; }
    if (!['NCRs', 'NCOs'].includes(state.activeTab)) return;
    if (meta && e.key.toLowerCase() === 's') { e.preventDefault(); saveTemplate(); }
    else if (meta && e.key.toLowerCase() === 'd') { e.preventDefault(); duplicateTemplate(); }
    else if (meta && e.key === 'Enter') { e.preventDefault(); copyPreview(); }
  });
}

function openThemeBuilder(existing) {
  const isEdit = !!existing;
  const draft = existing
    ? { ...existing }
    : { id: 'ct_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        name: 'My Theme', base: 'theme-midnight', accent: '#38bdf8', accent2: '#818cf8' };

  const wrap = el('div', { class: 'theme-builder' });

  const nameRow = el('div');
  nameRow.appendChild(el('label', {}, 'Theme name'));
  const nameInput = el('input', {
    type: 'text', value: draft.name,
    oninput: e => { draft.name = e.target.value; }
  });
  nameRow.appendChild(nameInput);

  const baseRow = el('div');
  baseRow.appendChild(el('label', {}, 'Base palette (light or dark)'));
  const baseSel = el('select', {
    onchange: e => { draft.base = e.target.value; updatePreviewSwatch(); }
  });
  BUILTIN_THEMES.forEach(b => {
    const o = el('option', { value: b.cls }, b.name);
    if (b.cls === draft.base) o.selected = true;
    baseSel.appendChild(o);
  });
  baseRow.appendChild(baseSel);

  const colorRow = el('div', { class: 'tb-row' });
  const c1 = el('div');
  c1.appendChild(el('label', {}, 'Accent color'));
  const c1Input = el('input', {
    type: 'color', value: draft.accent,
    oninput: e => { draft.accent = e.target.value; updatePreviewSwatch(); }
  });
  c1.appendChild(c1Input);
  const c2 = el('div');
  c2.appendChild(el('label', {}, 'Secondary accent'));
  const c2Input = el('input', {
    type: 'color', value: draft.accent2,
    oninput: e => { draft.accent2 = e.target.value; updatePreviewSwatch(); }
  });
  c2.appendChild(c2Input);
  colorRow.appendChild(c1);
  colorRow.appendChild(c2);

  const preview = el('div', { class: 'tb-preview' }, 'Live theme preview');
  function updatePreviewSwatch() {
    preview.style.background =
      `linear-gradient(135deg, ${draft.accent}, ${draft.accent2})`;
  }
  updatePreviewSwatch();

  wrap.appendChild(nameRow);
  wrap.appendChild(baseRow);
  wrap.appendChild(colorRow);
  wrap.appendChild(preview);

  openModal(isEdit ? 'Edit theme' : 'Create theme', [wrap], [
    el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
    el('button', {
      class: 'btn btn-primary',
      onclick: () => {
        if (!draft.name.trim()) { toast('Name required'); return; }
        if (isEdit) {
          const idx = state.customThemes.findIndex(x => x.id === draft.id);
          if (idx >= 0) state.customThemes[idx] = draft;
        } else {
          state.customThemes.unshift(draft);
        }
        persist();
        renderCustomThemes();
        // Apply immediately if active or new
        state.activeTheme = 'custom:' + draft.id;
        applyTheme();
        closeModal();
        toast(isEdit ? 'Theme updated' : 'Theme created');
      }
    }, isEdit ? 'Save changes' : 'Create')
  ]);
}

/* ---------- Theme ripple ---------- */
function applyThemeWithRipple(themeId, x, y, swatchBg) {
  if (typeof x === 'number' && typeof y === 'number') {
    const ripple = document.createElement('div');
    ripple.className = 'theme-ripple';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    ripple.style.background = swatchBg || 'var(--accent-grad)';
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 720);
  }
  state.activeTheme = themeId;
  applyTheme();
  persist();
}

/* ---------- Tag-card hover preview ---------- */
let _hoverTimer = null, _hoverPop = null;
function attachHoverPreview(card, template) {
  card.addEventListener('mouseenter', () => {
    clearTimeout(_hoverTimer);
    _hoverTimer = setTimeout(() => showHoverPreview(card, template), 220);
  });
  card.addEventListener('mouseleave', () => {
    clearTimeout(_hoverTimer);
    hideHoverPreview();
  });
}
function showHoverPreview(card, template) {
  hideHoverPreview();
  const html = previewHTML(template);
  if (!html) return;
  const pop = document.createElement('div');
  pop.className = 'tag-preview-pop'
    + (state.formattedPreview ? ' formatted-preview' : '')
    + (state.uppercaseText ? ' uppercase-text' : '');
  pop.innerHTML = html;
  document.body.appendChild(pop);
  const rect = card.getBoundingClientRect();
  // Default: anchor to the right of the card
  let left = rect.right + 8;
  let top = rect.top;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
  const popRect = pop.getBoundingClientRect();
  if (popRect.right > window.innerWidth - 8) {
    left = Math.max(8, rect.left - popRect.width - 8);
    pop.style.left = left + 'px';
  }
  if (popRect.bottom > window.innerHeight - 8) {
    top = Math.max(8, window.innerHeight - popRect.height - 8);
    pop.style.top = top + 'px';
  }
  _hoverPop = pop;
}
function hideHoverPreview() {
  if (_hoverPop) { _hoverPop.remove(); _hoverPop = null; }
}

/* ---------- Focus mode ---------- */
function toggleFocusMode() {
  state.focusMode = !state.focusMode;
  applyTheme();  // re-applies the body class with focus-mode flag
  const btn = $('#focusBtn');
  if (btn) btn.classList.toggle('feature-on', state.focusMode);
  toast(state.focusMode ? 'Focus mode on (⌘. to exit)' : 'Focus mode off');
}

/* ---------- Uppercase text ---------- */
function toggleFormattedPreview() {
  state.formattedPreview = !state.formattedPreview;
  const btn = $('#formatBtn');
  if (btn) btn.classList.toggle('feature-on', state.formattedPreview);
  updatePreview();
  hideHoverPreview();
  persist();
  toast(state.formattedPreview ? 'Formatted preview on' : 'Formatted preview off');
}

function toggleUppercaseText() {
  state.uppercaseText = !state.uppercaseText;
  const btn = $('#uppercaseBtn');
  if (btn) btn.classList.toggle('feature-on', state.uppercaseText);
  updatePreview();
  hideHoverPreview();
  persist();
  toast(state.uppercaseText ? 'Uppercase on' : 'Uppercase off');
}

/* ---------- BOOT ---------- */
loadPersisted();
seedDefaults();
setupGlobalEvents();
renderAll();
</script>
