<title>Red Tag Builder</title>
<style>
/* ============================================================================
   TAG BUILDER — single-file app (HTML + CSS + vanilla JS)
   ----------------------------------------------------------------------------
   Beginner notes:
   - Everything lives in this one .html file. No installs, no admin access.
   - State is held in one JS object called `state`. UI is rebuilt with render()
     functions whenever state changes — a tiny reactive pattern.
   - localStorage saves your tags between sessions (per-machine, per-browser).
     Use Export / Import (top right) to move them between computers.
   ============================================================================ */

/* ---------- THEME TOKENS ----------------------------------------------------
   Each theme = a set of CSS variables. Switching theme = swap class on <body>.
   Modify a value here and it cascades through the whole UI.
---------------------------------------------------------------------------- */
body.theme-sunrise {
  --bg-grad: linear-gradient(135deg, #FFE5D9 0%, #FFD6E0 100%);

  --border: #ecd9d3; --accent: #ff7a59; --accent-2: #ff4f87;
  --accent-grad: linear-gradient(135deg, #ff7a59, #ff4f87);
  --shadow: 0 4px 24px rgba(255,122,89,0.15);
}

/* ---------- BASE ---------- */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  background: var(--bg-grad); color: var(--text);
  font-size: 14px; line-height: 1.5; overflow: hidden;
  transition: background 0.4s ease, color 0.2s ease;
}
button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font: inherit; color: inherit; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ---------- LAYOUT ---------- */
.app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }

.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px;
  background: var(--surface); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: relative; z-index: 10;
}
.brand {
  font-weight: 700; font-size: 15px; letter-spacing: -0.2px;
  background: var(--accent-grad); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
  padding-right: 4px;
}
.tabs { display: flex; gap: 4px; }
.tab {
  padding: 7px 14px; border-radius: 999px;
  font-size: 13px; font-weight: 500; color: var(--text-muted);
  transition: all 0.15s;
}
.tab:hover { color: var(--text); background: var(--border); }
.tab.active {
  background: var(--accent-grad); color: white; box-shadow: var(--shadow);
}
.spacer { flex: 1; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); transition: all 0.15s; font-size: 15px;
}
.icon-btn svg { width: 16px; height: 16px; display: block; }
.icon-btn:hover { background: var(--border); color: var(--text); }

.main { display: grid; grid-template-columns: 250px minmax(0, 1fr) 500px; height: 100%; overflow: hidden; }

/* ---------- SIDEBAR ---------- */
.sidebar {
  background: var(--surface); backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-head { padding: 14px; border-bottom: 1px solid var(--border); }
.search {
  width: 100%; padding: 8px 12px; border-radius: 9px;
  border: 1px solid var(--border); background: var(--bg);
  margin-bottom: 8px; transition: border 0.15s;
}
.search:focus { outline: none; border-color: var(--accent); }
.btn {
  padding: 8px 14px; border-radius: 9px;
  font-weight: 500; font-size: 13px;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.15s; white-space: nowrap;
}
.btn-primary {
  background: var(--accent-grad); color: white;
  box-shadow: var(--shadow);
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-ghost { color: var(--text-muted); border: 1px solid transparent; }
.btn-ghost:hover { background: var(--border); color: var(--text); }
.btn-danger { color: var(--accent-2); }
.btn-block { width: 100%; justify-content: center; }
.btn-new-tag { margin-bottom: 8px; }
.filter-chips { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
.chip {
  padding: 4px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 500;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-muted); transition: all 0.15s;
}
.chip:hover { color: var(--text); }
.chip.active {
  background: var(--accent-grad); color: white; border-color: transparent;
}
.tag-list { flex: 1; overflow-y: auto; padding: 8px; }
.tag-card {
  position: relative;
  padding: 8px 88px 8px 12px; border-radius: 9px; margin-bottom: 4px;
  cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
}
.tag-card::after {
  content: '';
  position: absolute;
  left: 12px; right: 12px; bottom: -3px;
  height: 1px;
  background: color-mix(in srgb, var(--accent) 12%, var(--border));
  opacity: .55;
  pointer-events: none;
}
.tag-card.active::after,
.tag-card:hover::after { opacity: 0; }
.tag-pin {
  position: absolute; top: 50%; right: 6px; transform: translateY(-50%);
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; opacity: 0;
  transition: opacity 0.15s, background 0.15s;
  font-size: 14px; line-height: 1;
}
.tag-card:hover .tag-pin { opacity: 0.5; }
.tag-pin:hover { opacity: 1 !important; background: var(--border); }
.tag-pin.pinned { opacity: 1; color: #f59e0b; }
.tag-card.active .tag-pin { color: white; }
.tag-card.active .tag-pin.pinned { color: #fde68a; }
.tag-card:hover { background: var(--border); }
.tag-card.active {
  background: var(--accent-grad); color: white;
  border-color: transparent;
}
.tag-card.active .tag-card-meta { color: rgba(255,255,255,0.8); }
.tag-card-title {
  font-weight: 500; font-size: 13px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tag-card-meta { font-size: 11px; color: var(--text-muted); }
.tag-card-actions {
  position: absolute; top: 8px; right: 8px;
  display: flex; gap: 4px;
}
.tag-action {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); opacity: 0;
  transition: opacity 0.15s, background 0.15s, color 0.15s;
  font-size: 13px; line-height: 1;
}
.tag-card:hover .tag-action,
.tag-card.active .tag-action { opacity: 1; }
.tag-card.active .tag-action { color: rgba(255,255,255,0.82); }
.tag-action:hover { background: var(--border); color: var(--text); }
.tag-card.active .tag-action:hover { color: white; }
.tag-action.delete:hover { color: var(--accent-2); }
.tag-action svg { display: block; }
.tag-list-group { margin-bottom: 12px; }
.tag-list-group:last-child { margin-bottom: 0; }
.tag-list-group-title {
  padding: 6px 6px 8px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-muted);
}
.tag-list-group-empty {
  padding: 0 6px 8px;
  font-size: 12px; color: var(--text-muted);
}
.sidebar-foot {
  padding: 10px; border-top: 1px solid var(--border);
  display: flex; gap: 6px; align-items: center;
}
.sidebar-foot-spacer { flex: 1; }
.sidebar-settings-btn {
  width: 48px;
  height: 42px;
  min-height: 42px;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  padding: 0;
  border-color: color-mix(in srgb, var(--accent) 24%, transparent);
  font-size: 27px;
  line-height: 1;
}
.sidebar-settings-btn svg {
  width: 25px;
  height: 25px;
  display: block;
}
.sidebar-settings-glyph {
  display: block;
  line-height: 1;
  transform: translateY(-1px);
}
.sidebar-collapse-btn {
  width: 34px;
  justify-content: center;
  padding-left: 0;
  padding-right: 0;
  color: var(--accent);
  border-color: color-mix(in srgb, var(--accent) 24%, transparent);
}

/* ---------- BUILDER ---------- */
.builder { overflow-y: auto; padding: 12px 18px; }
.builder-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  align-items: stretch;
  margin-bottom: 10px; gap: 7px;
}
.builder-title {
  font-size: 22px; font-weight: 800; letter-spacing: -0.4px;
  background: linear-gradient(90deg, var(--accent-2), var(--accent));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  position: relative; display: inline-block;
  padding-bottom: 5px;
}
.builder-title::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: 0;
  height: 3px; border-radius: 999px;
  background: var(--accent-grad);
  opacity: 0.85;
}
.builder-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.builder-title-wrap {
  display: flex; align-items: end; gap: 12px;
  min-width: 0;
}
.builder-title-wrap .builder-actions {
  flex: 0 0 auto;
  align-self: stretch;
  align-items: center;
}
.builder-title-input {
  flex: 1;
  min-width: 220px;
  width: auto;
  padding: 8px 11px;
  border-radius: 10px;
  border: 1px solid color-mix(in srgb, var(--accent) 26%, var(--border));
  background: color-mix(in srgb, var(--accent) 6%, var(--bg));
  transition: border 0.15s, box-shadow .15s, background .15s;
  font: inherit; color: inherit;
  font-weight: 650;
  letter-spacing: .2px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.builder-title-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}
.builder-actions {
  padding: 3px;
  border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
  border-radius: 12px;
  background: color-mix(in srgb, var(--accent) 5%, var(--surface-2));
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  justify-self: end;
}
.builder-action-btn {
  padding: 5px 8px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .2px;
}
.builder-action-duplicate {
  color: var(--accent);
}
.builder-action-danger {
  color: var(--accent-2);
}
.builder-action-save {
  padding-inline: 10px;
}
.preview-template-actions {
  justify-self: auto;
  max-width: calc(100% - 100px);
  justify-content: flex-end;
}
.preview-template-actions .builder-action-btn {
  padding: 4px 7px;
}

.section {
  background: var(--surface); backdrop-filter: blur(10px);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 6px 8px; margin-bottom: 5px;
}
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.section-title {
  font-size: 14px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  background: var(--accent-grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.section-head-inline {
  justify-content: flex-start;
  gap: 8px;
  flex-wrap: wrap;
}
.section-head-input {
  width: 190px;
  padding: 6px 9px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--bg);
  transition: border 0.15s;
  font: inherit;
  color: inherit;
}
.section-head-input:focus {
  outline: none;
  border-color: var(--accent);
}
.builder-divider {
  position: relative;
  height: 1px;
  margin: 8px 2px 10px;
  background: linear-gradient(
    90deg,
    transparent 0%,
    color-mix(in srgb, var(--accent) 22%, var(--border)) 18%,
    color-mix(in srgb, var(--accent-2) 28%, var(--accent)) 50%,
    color-mix(in srgb, var(--accent) 22%, var(--border)) 82%,
    transparent 100%
  );
  opacity: 0.75;
}
.builder-divider::after {
  content: '';
  position: absolute;
  left: 50%;
  top: 50%;
  width: 84px;
  height: 10px;
  transform: translate(-50%, -50%);
  background: radial-gradient(
    ellipse at center,
    color-mix(in srgb, var(--accent) 18%, transparent) 0%,
    transparent 72%
  );
  pointer-events: none;
}

.row { display: grid; gap: 5px; margin-bottom: 3px; }
.row > * { min-width: 0; }
.row:last-child { margin-bottom: 0; }
.row-2 { grid-template-columns: 1fr 1fr; }
.row-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.row-rev { grid-template-columns: 1fr 1fr 2fr; }
.row-att { grid-template-columns: auto 1fr; align-items: end; gap: 12px; }

.field { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.field label { font-size: 11px; color: var(--accent-2); font-weight: 600; letter-spacing: 0.2px; }

/* Measurement labels — themed slightly differently from other field labels:
   small-caps tone with the accent gradient instead of solid accent-2. */
.measurement-field .field label {
  background: var(--accent-grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
  font-size: 10px;
}
.field input, .field textarea, .field select,
.inner-group > textarea {
  width: 100%;
  min-width: 0;
  padding: 6px 9px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--bg);
  transition: border 0.15s;
  font: inherit; color: inherit;
}
.field input:focus, .field textarea:focus, .field select:focus,
.inner-group > textarea:focus {
  outline: none; border-color: var(--accent);
}
input.start-tag-required,
textarea.start-tag-required {
  --start-tag-border: color-mix(in srgb, var(--accent-2) 70%, #ffcf33);
  border-color: var(--start-tag-border) !important;
  background:
    linear-gradient(135deg,
      color-mix(in srgb, var(--accent-2) 14%, var(--bg)),
      color-mix(in srgb, #ffcf33 10%, var(--bg)));
  box-shadow:
    0 0 0 2px color-mix(in srgb, var(--start-tag-border) 22%, transparent),
    0 0 18px color-mix(in srgb, var(--start-tag-border) 16%, transparent);
}
.field input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
.field input[type="number"]::-webkit-inner-spin-button,
.field input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none; margin: 0;
}
.field textarea, .inner-group > textarea {
  min-height: 38px; resize: vertical;
}
.field textarea.lg, .inner-group > textarea.lg { min-height: 64px; }
.field textarea.tag-paragraph,
.inner-group > textarea.tag-paragraph { min-height: 108px; }
.inner-group > textarea.tall { min-height: 56px; }
.field-hint {
  padding: 6px 10px; color: var(--text-muted); font-size: 12px;
  background: var(--bg); border-radius: 7px; border: 1px dashed var(--border);
}

.subsection {
  border: 1px solid var(--border); border-radius: 9px;
  padding: 5px 7px 6px; margin-bottom: 4px; background: var(--surface-2);
}
.subsection-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px; gap: 8px;
}
.subsection-title {
  font-size: 13px; font-weight: 700;
  background: var(--accent-grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subsection-title-wrap {
  display: flex; align-items: center; gap: 6px; min-width: 0;
}
.subsection-mini-input {
  width: 52px;
  padding: 4px 7px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--bg);
  transition: border 0.15s;
  font: inherit; color: inherit;
}
.subsection-mini-input:focus {
  outline: none;
  border-color: var(--accent);
}

/* Grouped fields inside an Item — flush with the surrounding rows
   so contents align with the part-number row above. */
.inner-group {
  margin: 4px 0; display: flex; flex-direction: column; gap: 2px;
}
.inner-group-title {
  font-size: 12px; font-weight: 600; color: var(--accent-2); letter-spacing: 0.2px;
}
.del-btn { color: var(--text-muted); font-size: 12px; padding: 3px 8px; border-radius: 6px; }
.del-btn:hover { background: var(--border); color: var(--accent-2); }

.add-btn {
  border: 1px dashed var(--border); padding: 6px 14px; border-radius: 8px;
  font-size: 12px; font-weight: 500; color: var(--text-muted);
  width: 100%; text-align: center; transition: all 0.15s;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); }

select {
  padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg);
}

/* ---------- PREVIEW PANE ---------- */
.preview-pane {
  background: var(--surface); backdrop-filter: blur(20px);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.preview-head {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}
.preview-title {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
}
.preview-start-btn {
  flex: 0 0 auto;
  padding: 7px 12px;
  border-radius: 999px;
  color: var(--start-tag-text, #fff);
  font-size: 12px;
  font-weight: 850;
  letter-spacing: .2px;
  background: var(--accent-grad);
  box-shadow:
    0 8px 20px color-mix(in srgb, var(--accent) 24%, transparent),
    inset 0 1px 0 rgba(255,255,255,.30);
  border: 1px solid color-mix(in srgb, var(--accent-2) 44%, rgba(255,255,255,.22));
  text-shadow: 0 1px 2px rgba(0,0,0,.34);
  transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
}
.preview-start-btn:hover {
  transform: translateY(-1px);
  filter: saturate(1.06) brightness(1.03);
  box-shadow:
    0 10px 24px color-mix(in srgb, var(--accent) 30%, transparent),
    inset 0 1px 0 rgba(255,255,255,.40);
}
.preview-start-btn:active { transform: translateY(0); }
.preview-body { flex: 1; overflow: auto; padding: 14px; }
.preview-card {
  position: relative; overflow: hidden;
  width: calc(51ch + 38px);
  min-width: calc(51ch + 38px);
  max-width: none;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 18px 16px;
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  font-size: 13px; line-height: 1.6;
  white-space: pre-wrap; word-break: break-word;
  box-shadow: var(--shadow);
}
.preview-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent-grad);
}
.preview-card em { color: var(--accent-2); font-style: italic; }
.preview-card .preview-placeholder {
  color: var(--text-muted); font-style: italic; opacity: 0.85;
}
.preview-card .lbl {
  color: var(--accent); font-weight: 600;
}
.preview-card .item-hdr {
  background: var(--accent-grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}
.preview-card .meas-hdr {
  color: var(--accent-2); font-weight: 600;
  text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;
}
.preview-card.formatted-preview,
.tag-preview-pop.formatted-preview {
  white-space: pre;
  word-break: normal;
  overflow-wrap: normal;
  overflow-x: auto;
}
.preview-card.formatted-preview {
  min-width: calc(51ch + 38px);
  max-width: none;
}
.preview-card.formatted-preview .preview-inline-label,
.tag-preview-pop.formatted-preview .preview-inline-label {
  white-space: pre-wrap;
}
.preview-foot {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 6px;
}

/* ---------- MODAL ---------- */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  display: none; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(6px);
}
.modal-backdrop.show { display: flex; }
.modal {
  background: var(--surface-2); color: var(--text);
  border: 1px solid var(--border); border-radius: 14px;
  padding: 18px; width: min(420px, 92vw);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal h3 { margin-bottom: 12px; font-size: 16px; }
.modal-options { display: grid; gap: 6px; margin-bottom: 12px; max-height: 50vh; overflow-y: auto; }
.modal:has(.theme-lab-layout) { width: auto; }
.modal-options:has(.theme-lab-layout) { max-height: 72vh; }
.modal-options button {
  text-align: left; padding: 10px 12px; border-radius: 9px;
  border: 1px solid var(--border); background: var(--bg);
  font-weight: 500; transition: all 0.15s;
}
.modal-options button:hover { border-color: var(--accent); }
.modal-foot { display: flex; justify-content: flex-end; gap: 8px; }

/* ---------- THEME PICKER ---------- */
.theme-picker {
  position: absolute; top: 50px; right: 16px;
  background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  display: none; z-index: 50; width: 250px;
  max-height: calc(100vh - 80px); overflow-y: auto;
}
.theme-picker.show { display: block; }
.theme-picker h4 {
  font-size: 10px; text-transform: uppercase;
  color: var(--text-muted); padding: 5px 6px 3px; letter-spacing: 0.5px;
}
.theme-opt {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 6px; border-radius: 7px; width: 100%;
  font-size: 12px; transition: background 0.15s;
}
.theme-opt:hover { background: var(--border); }
.theme-swatch { width: 18px; height: 18px; border-radius: 5px; border: 1px solid rgba(0,0,0,0.08); }

/* ---------- TOAST ---------- */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--surface-2); color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 18px; border-radius: 999px; font-size: 13px;
  box-shadow: var(--shadow);
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

/* ---------- DRAG IMPORT ---------- */
.drop-overlay {
  position: fixed; inset: 0;
  display: none; align-items: center; justify-content: center;
  background: color-mix(in srgb, var(--bg) 42%, rgba(0,0,0,0.34));
  backdrop-filter: blur(10px);
  z-index: 250;
  pointer-events: none;
}
body.drag-importing .drop-overlay { display: flex; }
.drop-overlay-card {
  min-width: min(420px, calc(100vw - 40px));
  max-width: 520px;
  padding: 22px 26px;
  border-radius: 18px;
  border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
  background: color-mix(in srgb, var(--surface-2) 88%, transparent);
  box-shadow: 0 18px 48px color-mix(in srgb, var(--accent) 18%, rgba(0,0,0,0.18));
  text-align: center;
}
.drop-overlay-title {
  font-size: 18px; font-weight: 800; margin-bottom: 4px;
  background: var(--accent-grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.drop-overlay-copy {
  font-size: 13px; color: var(--text-muted); line-height: 1.5;
}

/* ---------- GUIDES ---------- */
.guides { display: grid; grid-template-rows: auto 1fr; height: 100%; }
.guides-tabs {
  display: flex; gap: 6px; padding: 12px 16px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.guide-tab {
  padding: 6px 12px; border-radius: 8px; font-size: 13px;
  background: var(--bg); border: 1px solid var(--border);
  display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
}
.guide-tab.active {
  background: var(--accent-grad); color: white; border-color: transparent;
}
.guide-tab .x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 4px; font-size: 14px;
  opacity: 0.7;
}
.guide-tab .x:hover { background: rgba(255,255,255,0.25); opacity: 1; }
.guide-viewer { padding: 12px 16px; overflow: hidden; }
.guide-viewer iframe {
  width: 100%; height: 100%; border: 1px solid var(--border);
  border-radius: 12px; background: var(--bg);
}

/* ---------- EMPTY / COMING-SOON ---------- */
.empty-state {
  text-align: center; padding: 40px 16px;
  color: var(--text-muted); font-size: 13px;
}
.coming-soon {
  display: flex; align-items: center; justify-content: center;
  height: 100%; flex-direction: column; gap: 10px;
  color: var(--text-muted); text-align: center; padding: 40px;
}
.coming-soon h2 {
  font-size: 28px;
  background: var(--accent-grad); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
}

kbd {
  font-family: monospace; background: var(--border);
  padding: 1px 5px; border-radius: 4px; font-size: 11px;
}

/* ============================================================================
   POLISH LAYER — micro-interactions, focus halos, themed touches.
   Universal first, then per-theme "it factor" overrides.
   ============================================================================ */

/* Themed text selection + caret */
::selection { background: var(--accent); color: #fff; }
input, textarea { caret-color: var(--accent); }

/* Soft focus halo on every editable surface */
.field input:focus, .field textarea:focus, .field select:focus,
.inner-group > textarea:focus, .search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
}

/* Brand wordmark — slow drifting sheen along the gradient */
.brand {
  background-size: 220% 100%;
  animation: brandSheen 7s ease-in-out infinite;
}
@keyframes brandSheen {
  0%, 100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}

/* Topbar — subtle accent rule under the bottom border */
.topbar { position: relative; }
.topbar::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
  background: var(--accent-grad); opacity: 0.4; pointer-events: none;
}

/* Tabs — gentle lift on active */
.tab { transition: transform .18s cubic-bezier(.4,0,.2,1), background .18s, color .18s, box-shadow .2s; }
.tab.active { transform: translateY(-1px); }

/* Buttons — pressable feel + sweep on primary hover */
.btn { transition: transform .12s ease, box-shadow .18s ease, background .18s ease, color .15s ease; }
.btn:active { transform: scale(.97); }
.btn-primary { position: relative; overflow: hidden; isolation: isolate; }
.btn-primary::after {
  content: ''; position: absolute; inset: 0; z-index: -1;
  background: linear-gradient(120deg, transparent 25%, rgba(255,255,255,.28) 50%, transparent 75%);
  transform: translateX(-110%);
  transition: transform .65s ease;
}
.btn-primary:hover::after { transform: translateX(110%); }
.btn-primary:hover {
  box-shadow: 0 6px 20px color-mix(in srgb, var(--accent) 35%, transparent),
              0 1px 3px rgba(0,0,0,.12);
}

/* Icon buttons — tiny scale pop */
.icon-btn { transition: background .15s, color .15s, transform .15s; }
.icon-btn:hover { transform: scale(1.08); }
.icon-btn:active { transform: scale(.92); }

/* Section cards — accent border on hover */
.section { transition: border-color .25s ease, box-shadow .25s ease; }
.section:hover {
  border-color: color-mix(in srgb, var(--accent) 30%, var(--border));
}

/* Subsections — light up when focused */
.subsection { transition: border-color .2s ease, box-shadow .25s ease; }
.subsection:focus-within {
  border-color: var(--accent);
  box-shadow: 0 4px 18px color-mix(in srgb, var(--accent) 14%, transparent);
}

/* Sidebar tag cards — accent stripe + lift */
.tag-card {
  border-left: 3px solid transparent;
  transition: transform .18s ease, background .18s, border-left-color .2s, box-shadow .2s;
}
.tag-card:hover { transform: translateX(2px); border-left-color: var(--accent); }
.tag-card.active {
  border-left-color: transparent;
  box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 28%, transparent);
}

/* Preview card — soft glow on hover, deepen when copying */
.preview-card { transition: box-shadow .25s ease, transform .25s ease; }
.preview-card:hover {
  box-shadow: 0 10px 32px color-mix(in srgb, var(--accent) 18%, transparent),
              0 2px 6px rgba(0,0,0,.08);
}

/* Toast — accent-tinted ring */
.toast { border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); }

/* Modal — pop entry */
.modal-backdrop.show .modal { animation: modalIn .24s cubic-bezier(.2,.9,.3,1.2); }
@keyframes modalIn {
  from { opacity: 0; transform: translateY(10px) scale(.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Scrollbar — accent on hover */
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Theme picker swatches — subtle ring on hover */
.theme-opt:hover .theme-swatch {
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 60%, transparent);
}

/* ---------- THEME "IT FACTOR" ----------
   Exotic / dark themes get a slow background drift + animated topbar accent
   for atmosphere. Crisp light themes stay still for that "professional" feel. */

body.theme-aurora,
body.theme-cyberpunk,
body.theme-cosmos,
body.theme-ocean,
body.theme-midnight,
body.theme-charcoal,
body.theme-boeing-sky,
body.theme-alloy,
body.theme-emberline,
body.theme-command,
body.theme-titanium,
body.theme-carbon,
body.theme-blueprint {
  background-size: 220% 220%;
  animation: bgDrift 28s ease-in-out infinite alternate;
}
@keyframes bgDrift {
  0%   { background-position: 0% 0%; }
  100% { background-position: 100% 100%; }
}

/* Animated flowing topbar accent on the most expressive themes */
body.theme-aurora .topbar::after,
body.theme-cyberpunk .topbar::after,
body.theme-cosmos .topbar::after,
body.theme-ocean .topbar::after,
body.theme-alloy .topbar::after,
body.theme-emberline .topbar::after,
body.theme-command .topbar::after,
body.theme-titanium .topbar::after,
body.theme-carbon .topbar::after,
body.theme-blueprint .topbar::after {
  background-size: 220% 100%;
  animation: stripeFlow 9s linear infinite;
  opacity: .7;
}
@keyframes stripeFlow { to { background-position: 220% 0; } }

/* Glow under active tabs on dark themes */
body.theme-midnight .tab.active,
body.theme-charcoal .tab.active,
body.theme-cosmos .tab.active,
body.theme-cyberpunk .tab.active,
body.theme-aurora .tab.active,
body.theme-ocean .tab.active,
body.theme-boeing-sky .tab.active,
body.theme-alloy .tab.active,
body.theme-emberline .tab.active,
body.theme-command .tab.active,
body.theme-titanium .tab.active,
body.theme-carbon .tab.active,
body.theme-blueprint .tab.active {
  box-shadow: 0 6px 18px color-mix(in srgb, var(--accent) 50%, transparent),
              0 0 0 1px color-mix(in srgb, var(--accent) 25%, transparent);
}

/* Cyberpunk — neon glow on focus + primary text */
body.theme-cyberpunk .btn-primary {
  text-shadow: 0 0 8px color-mix(in srgb, var(--accent) 50%, transparent);
}
body.theme-cyberpunk .field input:focus,
body.theme-cyberpunk .field textarea:focus,
body.theme-cyberpunk .field select:focus,
body.theme-cyberpunk .inner-group > textarea:focus {
  box-shadow: 0 0 0 1px var(--accent),
              0 0 18px color-mix(in srgb, var(--accent) 55%, transparent);
}

/* Aurora — preview gets a multi-stop animated border-top */
body.theme-aurora .preview-card::before,
body.theme-cyberpunk .preview-card::before,
body.theme-cosmos .preview-card::before,
body.theme-titanium .preview-card::before,
body.theme-carbon .preview-card::before,
body.theme-blueprint .preview-card::before {
  background-size: 220% 100%;
  animation: stripeFlow 10s linear infinite;
}

/* Light themes — soft top-down sheen inside section cards */
body.theme-sunrise .section,
body.theme-mint .section,
body.theme-lavender .section,
body.theme-rosegold .section,
body.theme-sage .section,
body.theme-linen .section,
body.theme-monochrome .section,
body.theme-boeing-classic .section,
body.theme-highline .section,
body.theme-vapor .section,
body.theme-glacier .section {
  background-image: linear-gradient(180deg, rgba(255,255,255,.45), transparent 55%);
}

/* Boeing Classic — crisp navy top accent under the topbar */
body.theme-boeing-classic .topbar::after { opacity: .9; height: 2px; }

/* Cosmos / Aurora / Cyberpunk — radial accent halo behind the brand */
body.theme-cosmos .brand,
body.theme-aurora .brand,
body.theme-cyberpunk .brand {
  filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 35%, transparent));
}

/* Linen / Sage / Rosegold — paper-y fine inner border on cards */
body.theme-linen .section,
body.theme-sage .section,
body.theme-rosegold .section {
  box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 1px 0 rgba(0,0,0,.02);
}

/* Reduced motion — disable animated bg + sheens */
@media (prefers-reduced-motion: reduce) {
  body, .brand, .preview-card::before, .topbar::after { animation: none !important; }
  .btn-primary::after { display: none; }
  .modal-backdrop.show .modal { animation: none !important; }
}

/* ============================================================================
   FEATURE LAYER — custom themes, hover preview,
   theme ripple, focus mode, uppercase text.
   ============================================================================ */

/* ---------- Theme builder modal ---------- */
.theme-builder { display: grid; gap: 12px; }
.theme-builder .tb-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.theme-builder label {
  font-size: 11px; color: var(--accent-2); font-weight: 600;
  letter-spacing: 0.2px; display: block; margin-bottom: 4px;
}
.theme-builder input[type="color"] {
  width: 100%; height: 38px; padding: 2px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg); cursor: pointer;
}
.theme-builder input[type="text"], .theme-builder select {
  width: 100%; padding: 7px 9px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--bg);
  font: inherit; color: inherit;
}
.theme-builder .tb-preview {
  height: 56px; border-radius: 10px; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: white; letter-spacing: 0.4px;
  text-shadow: 0 1px 2px rgba(0,0,0,.35);
}

/* Custom themes section in theme picker */
.theme-picker .ct-row {
  display: flex; align-items: center; gap: 4px;
}
.theme-picker .ct-row .theme-opt { flex: 1; min-width: 0; }
.theme-picker .ct-row .theme-opt span:not(.theme-swatch) {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.theme-picker .ct-mini-btn {
  width: 22px; height: 22px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 12px; transition: all .15s;
}
.theme-picker .ct-mini-btn:hover { background: var(--border); color: var(--text); }
.theme-picker .ct-mini-btn.del:hover { color: var(--accent-2); }
.theme-picker .ct-mini-btn svg { width: 12px; height: 12px; display: block; }
.theme-picker .ct-empty {
  padding: 6px 8px; font-size: 11px; color: var(--text-muted);
  font-style: italic;
}

/* ---------- Tag-card hover preview popover ---------- */
.tag-preview-pop {
  position: fixed; z-index: 80;
  width: 360px; max-height: min(360px, calc(100vh - 16px)); overflow: hidden;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  font-size: 12px; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
  box-shadow: 0 16px 40px rgba(0,0,0,.28), 0 2px 8px rgba(0,0,0,.1);
  pointer-events: none;
  animation: popIn .14s ease;
}
.tag-preview-pop.formatted-preview {
  width: calc(51ch + 38px);
  max-width: min(calc(100vw - 16px), calc(51ch + 38px));
}
.tag-preview-pop.is-long::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 54px;
  background: linear-gradient(180deg, transparent, var(--surface-2));
  pointer-events: none;
}
.tag-preview-pop::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--accent-grad);
  border-radius: 12px 12px 0 0;
}
.tag-preview-pop em { color: var(--accent-2); font-style: italic; }
.tag-preview-pop .lbl { color: var(--accent); font-weight: 600; }
.tag-preview-pop .item-hdr {
  background: var(--accent-grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; font-weight: 700;
}
.tag-preview-pop .meas-hdr {
  color: var(--accent-2); font-weight: 700;
  text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;
}
.tag-preview-pop .preview-placeholder { color: var(--text-muted); font-style: italic; }
@keyframes popIn {
  from { opacity: 0; transform: translateX(-6px) scale(.98); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}

/* ---------- Theme ripple ---------- */
.theme-ripple {
  position: fixed; pointer-events: none; z-index: 9999;
  border-radius: 50%; width: 0; height: 0;
  transform: translate(-50%, -50%);
  animation: themeRipple .7s cubic-bezier(.2,.6,.3,1) forwards;
}
@keyframes themeRipple {
  0%   { width: 0; height: 0; opacity: .8; }
  60%  { opacity: .55; }
  100% { width: 260vmax; height: 260vmax; opacity: 0; }
}

/* ---------- Focus mode ---------- */
body.focus-mode .sidebar,
body.focus-mode .resizer-left { display: none; }
body.focus-mode .main { grid-template-columns: minmax(0, 1fr) 6px minmax(calc(51ch + 66px), 500px) !important; }
body.focus-mode .builder { max-width: none; margin: 0; padding: 24px 28px; }
.sidebar-restore-btn {
  position: fixed;
  left: 14px;
  bottom: 14px;
  z-index: 75;
  width: 36px;
  height: 36px;
  padding: 0;
  border-radius: 11px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: white;
  background: var(--accent-grad);
  box-shadow: 0 8px 20px color-mix(in srgb, var(--accent) 24%, rgba(0,0,0,.18));
  font-size: 17px;
  font-weight: 850;
  transition: box-shadow .15s, filter .15s;
}
.sidebar-restore-btn:hover {
  filter: brightness(1.04) saturate(1.05);
  box-shadow: 0 8px 20px color-mix(in srgb, var(--accent) 28%, rgba(0,0,0,.18));
}
.icon-btn.feature-on {
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 15%, transparent);
}
.builder-collapse-btn {
  flex: 0 0 auto;
  width: 30px;
  height: 30px;
  border-radius: 9px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 8%, var(--bg));
  border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--border));
  transition: transform .15s, background .15s, color .15s;
}
.builder-collapse-btn:hover {
  transform: translateY(-1px);
  background: color-mix(in srgb, var(--accent) 16%, var(--bg));
  color: var(--text);
}

body.custom-theme-vars .section,
body.custom-theme-vars .settings-panel,
body.custom-theme-vars .preview-card,
body.custom-theme-vars .theme-card,
body.custom-theme-vars .modal,
body.custom-theme-vars .tag-preview-pop {
  border-radius: var(--ui-radius, 12px);
}
body.custom-theme-vars .btn,
body.custom-theme-vars .icon-btn,
body.custom-theme-vars .field input,
body.custom-theme-vars .field textarea,
body.custom-theme-vars .field select,
body.custom-theme-vars .search,
body.custom-theme-vars .builder-title-input,
body.custom-theme-vars .tag-card,
body.custom-theme-vars .subsection,
body.custom-theme-vars .meas-section,
body.custom-theme-vars .meas-section-name-wrap {
  border-radius: calc(var(--ui-radius, 12px) * .72);
}
body.custom-theme-vars .builder,
body.custom-theme-vars .preview-body,
body.custom-theme-vars .settings-page {
  padding-top: calc(12px * var(--ui-density, 1));
  padding-bottom: calc(12px * var(--ui-density, 1));
}
body.custom-theme-vars .section,
body.custom-theme-vars .subsection {
  padding: calc(6px * var(--ui-density, 1)) calc(8px * var(--ui-density, 1));
}

.uppercase-text .preview-preserve-case { text-transform: none; }

/* ============================================================================
   v3 FEATURE LAYER — measurement sections, otherBlocks, spec ref, tag chips,
   sort, favorites, resizable panels, undo toast.
   ============================================================================ */

/* ---------- Measurement section card ---------- */
.meas-section {
  position: relative;
  padding: 8px 10px;
  margin: 6px 0;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--accent) 4%, var(--surface-2));
  transition: border-color .2s ease, box-shadow .25s ease, background .2s;
}
.meas-section::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  border-radius: 0 3px 3px 0;
  background: var(--accent-grad);
  opacity: .55;
}
.meas-section:focus-within {
  border-color: var(--accent);
  box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 14%, transparent);
}
.meas-section-head {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.meas-section-name-wrap {
  flex: 1;
  display: flex; align-items: center; gap: 7px;
  padding: 2px 6px 2px 9px;
  border-radius: 8px;
  background: color-mix(in srgb, var(--accent) 8%, var(--bg));
  border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.meas-section-name-wrap:focus-within {
  border-color: var(--accent);
  background: var(--bg);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}
.meas-section-edit-icon {
  flex-shrink: 0;
  width: 15px; height: 15px;
  color: var(--accent-2);
  opacity: .9;
}
.meas-section-name {
  flex: 1;
  min-width: 0;
  padding: 5px 2px;
  font: inherit; color: inherit;
  border: none;
  background: transparent;
  font-weight: 700; font-size: 13px; letter-spacing: 0.3px;
  background: var(--accent-grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.meas-section-name::placeholder {
  -webkit-text-fill-color: var(--text-muted);
  opacity: .6; font-weight: 500; letter-spacing: 0;
}
.meas-section-name:focus {
  outline: none;
  -webkit-text-fill-color: var(--text);
}
.meas-section-del {
  width: 24px; height: 24px;
  border-radius: 6px;
  font-size: 16px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.meas-section-del:hover { background: var(--border); color: var(--accent-2); }

.add-btn-meas {
  margin-top: 2px;
  font-weight: 600;
  background: color-mix(in srgb, var(--accent) 6%, transparent);
}
.add-btn-meas:hover {
  background: color-mix(in srgb, var(--accent) 14%, transparent);
}

/* ---------- Spec auto-reference button row ---------- */
.spec-ref-row {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 8px;
  margin-top: 6px;
}
.spec-ref-label {
  font-size: 11px; font-weight: 700;
  color: var(--accent-2); letter-spacing: 0.3px;
  text-transform: uppercase;
}
.spec-ref-chips {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.spec-ref-chip {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px; font-weight: 600;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-muted);
  letter-spacing: 0.2px;
  transition: all .15s;
  max-width: 220px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.spec-ref-chip:hover {
  border-color: var(--accent);
  color: var(--text);
}
.spec-ref-chip.active {
  background: var(--accent-grad);
  color: white;
  border-color: transparent;
  box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 35%, transparent);
}
.spec-ref-off { color: var(--text-muted); }
.spec-ref-off.active { background: var(--text-muted); }

/* ---------- Add Other footer button ---------- */
.add-other-wrap { margin: 10px 0 4px; display: flex; justify-content: center; }
.other-tags-spacer {
  height: 1px;
  margin: 12px auto 10px;
  width: min(420px, 86%);
  border-radius: 999px;
  background: linear-gradient(
    90deg,
    transparent 0%,
    color-mix(in srgb, var(--accent) 22%, transparent) 18%,
    color-mix(in srgb, var(--accent-2) 48%, var(--accent)) 50%,
    color-mix(in srgb, var(--accent) 22%, transparent) 82%,
    transparent 100%
  );
  opacity: .78;
}
.btn-add-other {
  padding: 7px 24px;
  min-width: 240px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 12px;
  background: color-mix(in srgb, var(--accent) 5%, var(--bg));
  border: 1px solid color-mix(in srgb, var(--accent) 26%, var(--border));
  color: var(--accent-2);
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  transition: all .18s;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}
.btn-add-other:hover {
  background: var(--accent-grad);
  color: white;
  border-color: transparent;
  transform: translateY(-1px);
  box-shadow: 0 3px 12px color-mix(in srgb, var(--accent) 24%, transparent);
}
.add-other-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--accent) 18%, transparent);
  font-weight: 800;
  font-size: 12px;
  transition: background .2s;
}
.btn-add-other:hover .add-other-icon { background: rgba(255,255,255,0.25); }

/* ---------- Other-block label + text inputs ---------- */
.other-block { padding: 10px 12px 12px; }
.other-block-head {
  align-items: stretch;
  margin-bottom: 8px;
  gap: 8px;
}
.other-block-label-wrap {
  flex: 1;
  display: flex; align-items: center; gap: 8px;
  padding: 4px 6px 4px 10px;
  border-radius: 8px;
  background: color-mix(in srgb, var(--accent) 8%, var(--bg));
  border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.other-block-label-wrap:focus-within {
  border-color: var(--accent);
  background: var(--bg);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}
.other-block-label-tag {
  flex-shrink: 0;
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  background: var(--accent-grad);
  color: white;
  box-shadow: 0 2px 6px color-mix(in srgb, var(--accent) 30%, transparent);
}
.other-block-label-input {
  flex: 1;
  padding: 6px 4px;
  border: none;
  background: transparent;
  font: inherit; color: inherit;
  font-size: 13px;
  font-weight: 600;
}
.other-block-label-input:focus { outline: none; }
.other-block-label-input::placeholder {
  color: var(--text-muted);
  font-weight: 500;
  opacity: .7;
}
.other-block-text {
  display: block;
  width: 100%;
  min-height: 90px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  font: inherit; color: inherit;
  resize: vertical;
  transition: border-color .15s, box-shadow .15s;
}
.other-block-text:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
}

/* ---------- Tag chips (template tag system) ---------- */
.tag-chips-edit {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 4px;
  min-height: 36px;
  border-radius: 9px;
  background: var(--bg);
  border: 1px solid var(--border);
  align-items: center;
  transition: border-color .15s;
}
.tag-chips-edit:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}
.tag-chip-edit {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 4px 4px 10px;
  border-radius: 999px;
  font-size: 12px; font-weight: 600;
  background: var(--accent-grad);
  color: white;
  letter-spacing: 0.2px;
  box-shadow: 0 2px 6px color-mix(in srgb, var(--accent) 26%, transparent);
}
.tag-chip-x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  color: white;
  font-size: 14px; line-height: 1;
  transition: background .15s;
}
.tag-chip-x:hover { background: rgba(255,255,255,0.4); }
.tag-chip-input {
  flex: 1;
  min-width: 100px;
  padding: 4px 8px;
  border: none;
  background: transparent;
  font: inherit; color: inherit;
}
.tag-chip-input:focus { outline: none; }

/* Sidebar tag-card chips */
.tag-card-tags {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-top: 4px;
}
.tag-card-tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 999px;
  font-size: 10px; font-weight: 600;
  background: color-mix(in srgb, var(--accent) 14%, transparent);
  color: var(--accent);
  letter-spacing: 0.3px;
  transition: background .15s, color .15s;
  cursor: pointer;
}
.tag-card-tag:hover {
  background: color-mix(in srgb, var(--accent) 28%, transparent);
}
.tag-card-tag.more {
  cursor: default;
  color: var(--text-muted);
  background: transparent;
}
.tag-card.active .tag-card-tag {
  background: rgba(255,255,255,0.22);
  color: white;
}

/* Sidebar sort + tag filter */
.sidebar-sort-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 8px;
}
.sidebar-sort-label {
  font-size: 11px; font-weight: 700;
  color: var(--accent-2);
  letter-spacing: 0.4px;
  text-transform: uppercase;
}
.sidebar-sort-select {
  flex: 1;
  padding: 5px 8px;
  font-size: 12px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
}
.sidebar-sort-select:focus {
  outline: none;
  border-color: var(--accent);
}

.tag-filter-row {
  display: flex; align-items: center; gap: 6px;
  padding-top: 8px;
  border-top: 1px solid color-mix(in srgb, var(--accent) 18%, var(--border));
}
.tag-filter-label {
  font-size: 11px; font-weight: 700;
  color: var(--accent-2);
  letter-spacing: 0.4px;
  text-transform: uppercase;
}
.tag-filter-select {
  flex: 1;
  min-width: 0;
  padding: 6px 9px;
  font-size: 12px;
  border-radius: 8px;
  border: 1px solid color-mix(in srgb, var(--accent) 26%, var(--border));
  background: color-mix(in srgb, var(--accent) 6%, var(--bg));
  color: var(--text);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.tag-filter-select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}

/* ---------- Colorful template titles ---------- */
.tag-card-title {
  font-weight: 700;
  font-size: 13.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.1px;
  filter: saturate(1.1);
}
.tag-card.active .tag-card-title {
  -webkit-text-fill-color: white;
  background: none;
  filter: none;
}
.tag-card.pinned-card {
  background: color-mix(in srgb, var(--accent) 5%, transparent);
}
.tag-card.pinned-card:hover {
  background: color-mix(in srgb, var(--accent) 12%, var(--border));
}

/* ---------- Favorite (★) button always visible when pinned ---------- */
.tag-action-fav {
  font-size: 14px;
  line-height: 1;
}
.tag-action-fav.active-fav {
  opacity: 1 !important;
  color: #f59e0b;
}
.tag-card.active .tag-action-fav.active-fav {
  color: #fde68a;
}

/* ---------- Resizable panel handles ---------- */
.resizer {
  position: relative;
  cursor: col-resize;
  user-select: none;
  background: transparent;
  transition: background .15s;
  display: flex; align-items: center; justify-content: center;
  z-index: 5;
}
.resizer-grip {
  width: 2px;

<script>
/* ============================================================================
   STATE — single source of truth
   ============================================================================ */

const STORAGE_KEY = 'tagBuilder.v1';

/* ============================================================================
   PASTE JSON HERE
   ----------------------------------------------------------------------------
   Future release setup:
   1. Export JSON from the app.
   2. Replace the words Paste JSON here between the backticks below with the
      full exported JSON object.
   3. Save this HTML file. On first load, the baked JSON will merge into the
      app automatically. Leave the placeholder text as-is when you do not want
      baked-in data.
   ============================================================================ */
const BAKED_IN_JSON = String.raw`
Paste JSON here
`;

// blankTag() returns a fresh tag object every call. Doing this as a function
// (instead of a constant) avoids accidentally sharing references between tags.
const blankTag = () => ({
  id: 'tag_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
  templateName: '',
  type: 'NCR',
  revisionNumber: 0,      // if > 0, prepends "*Revision N*" line at the top
  drawings: [
    { type: 'Engineering', custom: '', number: '', sheet: '', rev: '', location: '' }
  ],
  processSpecs: [
    { number: '', section: '', rev: '' }
  ],
  items: [ blankItem() ],
  lso: '',
  lio: '',
  carrotTemplateId: null,
  carrotTemplateName: '',
  carrotsText: '',
  attachmentsEnabled: true,
  attachmentsText: '*See Attachments*',
  otherBlocks: [],      // [{ id, label, text }] free-form trailing notes
  pinned: false,        // pin tags to the top of the sidebar (favorites)
  tags: [],             // user tags (chips) for organization
  createdAt: Date.now(),
  updatedAt: Date.now()
});

function blankTagForType(type = 'NCR') {
  const tag = blankTag();
  tag.type = type;
  if (type === 'NCO') tag.attachmentsEnabled = false;
  return tag;
}

function blankMeasSection(name = 'Measurements') {
  return {
    id: 'ms_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    name,
    text: ''
  };
}

function blankOtherBlock(label = 'Note') {
  return {
    id: 'ob_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    label,
    text: ''
  };
}

function blankItem(itemNumber = '') {
  return {
    itemNumber: itemNumber ? String(itemNumber) : '',
    countOf: '', countTotal: '',
    partNumber: '', description: '',
    discrepancy: '',
    measSections: [ blankMeasSection('Measurements') ],
    sbText: '',
    sbAutoRefIndexes: [0]   // [] = off, otherwise indexes into processSpecs
  };
}

const state = {
  activeTab: 'NCRs',
  activeTheme: 'theme-alloy',
  tags: [],          // saved NCR tags
  templates: [],     // saved templates
  carrotTemplates: [], // saved NCO carrot templates
  deletionHistory: [], // [{ id, title, bemsid, deletedAt, type }]
  current: blankTagForType('NCR'),
  selectedId: null,  // id of the currently-loaded template (null = new)
  selectedCarrotId: null,
  previewSuppressed: false,
  carrotPreviewSuppressed: false,
  search: '',
  dateFilter: 'all', // 'all' | 'today' | 'week' | 'month'
  tagFilter: '',     // filter by template tag (chip)
  sortMode: 'updated', // 'updated' | 'created' | 'name' | 'name-desc'
  guides: [],        // [{name, url}] PDFs loaded via file picker (object URLs)
  activeGuideIdx: 0,
  customThemes: [],  // user-built themes [{id, name, base, accent, accent2}]
  focusMode: false,  // transient — not persisted
  startTagMode: false,
  formattedPreview: false,
  uppercaseText: false,
  sidebarWidth: 250,
  previewWidth: 500,
  scanPrefixStrip: true,
  settingsReturnTab: 'NCRs',
  history: [],       // undo stack [{type, payload, label}]
  redoStack: []
};

/* ---------- PERSISTENCE ----------
   Tags + templates + active theme survive page reloads via localStorage.
   PDF guides do NOT persist — object URLs only live for the session,
   which is fine since the user loads from a shared folder each time. */
function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    activeTheme: state.activeTheme,
    tags: state.tags,
    templates: state.templates,
    carrotTemplates: state.carrotTemplates,
    deletionHistory: state.deletionHistory,
    customThemes: state.customThemes,
    formattedPreview: state.formattedPreview,
    uppercaseText: state.uppercaseText,
    sidebarWidth: state.sidebarWidth,
    previewWidth: state.previewWidth,
    sortMode: state.sortMode,
    scanPrefixStrip: state.scanPrefixStrip
  }));
}
function loadPersisted() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    state.activeTheme = data.activeTheme || state.activeTheme;
    state.tags = (data.tags || []).map(migrateTag);
    state.templates = (data.templates || []).map(migrateTag);
    state.carrotTemplates = data.carrotTemplates || [];
    state.deletionHistory = Array.isArray(data.deletionHistory) ? data.deletionHistory : [];
    state.customThemes = data.customThemes || [];
    state.formattedPreview = !!data.formattedPreview;
    state.uppercaseText = !!data.uppercaseText;
    if (typeof data.sidebarWidth === 'number') state.sidebarWidth = data.sidebarWidth;
    if (typeof data.previewWidth === 'number') state.previewWidth = data.previewWidth;
    if (typeof data.sortMode === 'string') state.sortMode = data.sortMode;
    if (typeof data.scanPrefixStrip === 'boolean') state.scanPrefixStrip = data.scanPrefixStrip;
  } catch (e) { console.warn('Load failed', e); }
}

// Migrate legacy tag/template format -> new schema (measSections, otherBlocks, tags)
function migrateTag(t) {
  if (!t || typeof t !== 'object') return t;
  if (!Array.isArray(t.otherBlocks)) t.otherBlocks = [];
  if (!Array.isArray(t.tags)) t.tags = [];
  if (Array.isArray(t.items)) {
    t.items = t.items.map(it => migrateItem(it));
  }
  return t;
}

function migrateItem(it) {
  if (!it || typeof it !== 'object') return it;
  // Build measSections from any prior shape (legacy item-level L/W/D, or
  // the earlier intermediate format that stored L/W/D inside each section).
  const oldL = it.measL, oldW = it.measW, oldD = it.measD;
  const oldCustom = it.measCustom;
  const fmt = (v, suf) => {
    const raw = String(v || '').trim();
    if (!raw) return '';
    if (/[′']$/.test(raw)) return raw.replace(/[′']$/, "'") + suf;
    if (/["″]$/.test(raw)) return raw.replace(/["″]$/, '"') + suf;
    return raw + '"' + suf;
  };
  const fold = (l, w, d) => {
    const parts = [];
    if (l) parts.push(fmt(l, 'L'));
    if (w) parts.push(fmt(w, 'W'));
    if (d) parts.push(fmt(d, 'D'));
    return parts.length ? parts.join(' x ') : '';
  };

  if (!Array.isArray(it.measSections)) {
    const measLine = fold(oldL, oldW, oldD);
    const sections = [];
    sections.push({
      id: 'ms_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      name: 'Measurements',
      text: [measLine, measLine && oldCustom ? oldCustom : ''].filter(Boolean).join('\n')
        || (oldCustom && !measLine ? '' : '')
    });
    if (oldCustom && !measLine) {
      sections.push({
        id: 'ms_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6) + 'b',
        name: '',
        text: oldCustom
      });
    }
    it.measSections = sections;
  } else {
    // Earlier intermediate format had measL/W/D inside each section. Fold them.
    it.measSections = it.measSections.map(sec => {
      const line = fold(sec.measL, sec.measW, sec.measD);
      const folded = {
        id: sec.id || ('ms_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6)),
        name: sec.name || '',
        text: [line, sec.text].filter(Boolean).join(line && sec.text ? '\n' : '')
      };
      return folded;
    });
  }
  // Migrate sbAutoRef boolean / sbAutoRefIndex int -> sbAutoRefIndexes array
  if (!Array.isArray(it.sbAutoRefIndexes)) {
    if (typeof it.sbAutoRefIndex === 'number') {
      it.sbAutoRefIndexes = it.sbAutoRefIndex >= 0 ? [it.sbAutoRefIndex] : [];
    } else {
      it.sbAutoRefIndexes = it.sbAutoRef === false ? [] : [0];
    }
  }
  delete it.measL; delete it.measW; delete it.measD; delete it.measCustom;
  delete it.sbAutoRef; delete it.sbAutoRefIndex;
  return it;
}

/* ---------- DOM HELPERS ---------- */
const $  = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

// el(tag, attrs, children) — tiny createElement helper.
// Beginner note: this lets us build DOM trees declaratively, almost like JSX.
function el(tag, attrs = {}, children = []) {
  const node = document.createElement(tag);
  for (const k in attrs) {
    if (attrs[k] == null) continue;
    if (k === 'class') node.className = attrs[k];
    else if (k === 'html') node.innerHTML = attrs[k];
    else if (k === 'style') node.style.cssText = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function')
      node.addEventListener(k.slice(2), attrs[k]);
    else node.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null || c === false) return;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return node;
}

function toast(msg) {
  const t = $('#toast');
  t.innerHTML = '';
  t.appendChild(document.createTextNode(msg));
  t.classList.add('show');
  t.classList.remove('with-action');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ---------- Undo / Redo ----------
   Tracks structural history events (template/caret create + delete) so a user
   can roll back an accidental click. The toast surfaces an Undo button for
   ~6 seconds; ⌘Z / ⌘⇧Z work globally. */
const HISTORY_LIMIT = 25;
function pushHistory(entry) {
  state.history.push(entry);
  if (state.history.length > HISTORY_LIMIT) state.history.shift();
  state.redoStack.length = 0;
  renderUndoButton();
}
function actionToast(msg, label, action) {
  const t = $('#toast');
  t.innerHTML = '';
  t.appendChild(document.createTextNode(msg));
  const btn = el('button', {
    class: 'toast-action',
    onclick: e => { e.stopPropagation(); action(); t.classList.remove('show'); }
  }, label);
  t.appendChild(btn);
  t.classList.add('show', 'with-action');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => {
    t.classList.remove('show'); t.classList.remove('with-action');
  }, 6000);
}
function performUndo() {
  const entry = state.history.pop();
  if (!entry) { toast('Nothing to undo'); return; }
  state.redoStack.push(applyHistoryReverse(entry));
  renderUndoButton();
  persist();
  renderAll();
  toast('Undid: ' + entry.label);
}
function performRedo() {
  const entry = state.redoStack.pop();
  if (!entry) { toast('Nothing to redo'); return; }
  state.history.push(applyHistoryReverse(entry));
  renderUndoButton();
  persist();
  renderAll();
  toast('Redid: ' + entry.label);
}
function applyHistoryReverse(entry) {
  // Returns the inverse entry to push onto the opposite stack.
  const reverse = { type: '', label: entry.label, payload: null };
  switch (entry.type) {
    case 'create-template': {
      // Undo a creation = remove it; reverse = re-create
      const idx = state.templates.findIndex(x => x.id === entry.payload.id);
      const removed = idx >= 0 ? state.templates.splice(idx, 1)[0] : entry.payload;
      if (state.selectedId === entry.payload.id) {
        state.selectedId = null;
        state.current = blankTagForType(currentTagType());
      }
      reverse.type = 'delete-template';
      reverse.payload = { template: clone(removed), index: idx };
      return reverse;
    }
    case 'delete-template': {
      // Undo a deletion = re-insert; reverse = re-delete
      const tpl = clone(entry.payload.template);
      const insertAt = Math.min(entry.payload.index ?? 0, state.templates.length);
      state.templates.splice(insertAt, 0, tpl);
      reverse.type = 'create-template';
      reverse.payload = clone(tpl);
      return reverse;
    }
    case 'create-caret': {
      const idx = state.carrotTemplates.findIndex(x => x.id === entry.payload.id);
      const removed = idx >= 0 ? state.carrotTemplates.splice(idx, 1)[0] : entry.payload;
      reverse.type = 'delete-caret';
      reverse.payload = { template: clone(removed), index: idx };
      return reverse;
    }
    case 'delete-caret': {
      const tpl = clone(entry.payload.template);
      const insertAt = Math.min(entry.payload.index ?? 0, state.carrotTemplates.length);
      state.carrotTemplates.splice(insertAt, 0, tpl);
      reverse.type = 'create-caret';
      reverse.payload = clone(tpl);
      return reverse;
    }
  }
  return reverse;
}
function renderUndoButton() {
  const btn = $('#undoBtn');
  const rbtn = $('#redoBtn');
  if (btn) btn.classList.toggle('feature-on', state.history.length > 0);
  if (rbtn) rbtn.classList.toggle('feature-on', state.redoStack.length > 0);
}

const clone = o => JSON.parse(JSON.stringify(o));

/* ---------- Scan prefix stripping ----------
   Barcode scanners frequently prepend marker prefixes (1K, 1P, K606, K 606,
   bare 606) to the scanned content. Strip them on input so the form value is
   the meaningful number. We only strip when the prefix sits at the start of
   the value AND has at least one alphanumeric character after it — that way
   a user typing the literal "606" still works. */
const SCAN_PREFIX_RE = /^(?:1K|1P|K\s?606|606)(?=[\s:\-]?[A-Za-z0-9])/i;
function stripScanPrefix(value) {
  if (!state.scanPrefixStrip || typeof value !== 'string') return value;
  let v = value;
  let prev;
  // Repeat in case multiple prefixes were concatenated by the scanner.
  do {
    prev = v;
    v = v.replace(SCAN_PREFIX_RE, '').replace(/^[\s:\-]+/, '');
  } while (v !== prev);
  return v;
}

function formatDate(ms) {
  const d = new Date(ms);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
         ' ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}

function applyTheme() {
  // Reset any inline custom-theme variables before applying the next theme.
  [
    '--bg-grad', '--bg', '--surface', '--surface-2', '--text', '--text-muted',
    '--border', '--accent', '--accent-2', '--accent-grad', '--shadow',
    '--ui-radius', '--ui-density'
  ].forEach(p =>
    document.body.style.removeProperty(p));

  let cls = state.activeTheme;
  let customClass = '';
  if (cls && cls.startsWith('custom:')) {
    const id = cls.slice(7);
    const ct = state.customThemes.find(t => t.id === id);
    if (ct) {
      cls = ct.base || 'theme-midnight';
      customClass = ' custom-theme-vars';
      if (ct.bg) document.body.style.setProperty('--bg', ct.bg);
      if (ct.bg2) document.body.style.setProperty('--bg-grad',
        `linear-gradient(${ct.angle || 135}deg, ${ct.bg || '#0b1020'}, ${ct.bg2 || ct.bg || '#1e293b'})`);
      if (ct.surface) document.body.style.setProperty('--surface', hexToRgba(ct.surface, ct.surfaceAlpha || 0.74));
      if (ct.surface2) document.body.style.setProperty('--surface-2', ct.surface2);
      if (ct.text) document.body.style.setProperty('--text', ct.text);
      if (ct.muted) document.body.style.setProperty('--text-muted', ct.muted);
      if (ct.border) document.body.style.setProperty('--border', ct.border);
      document.body.style.setProperty('--accent', ct.accent);
      document.body.style.setProperty('--accent-2', ct.accent2);
      document.body.style.setProperty('--accent-grad',
        `linear-gradient(${ct.angle || 135}deg, ${ct.accent}, ${ct.accent2})`);
      document.body.style.setProperty('--shadow',
        `0 4px ${Math.round(18 + (ct.glow || 22) * .6)}px ${hexToRgba(ct.accent, (ct.glow || 22) / 100)}`);
      document.body.style.setProperty('--ui-radius', (ct.radius || 12) + 'px');
      document.body.style.setProperty('--ui-density', String(ct.density || 1));
    } else {
      cls = 'theme-midnight';
    }
  }
  document.body.className = cls + customClass + (state.focusMode ? ' focus-mode' : '');
}

// Convert #rrggbb (or #rgb) to rgba(r,g,b,alpha) string.
function hexToRgba(hex, alpha) {
  let h = String(hex || '').replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  const r = parseInt(h.slice(0, 2), 16) || 0;
  const g = parseInt(h.slice(2, 4), 16) || 0;
  const b = parseInt(h.slice(4, 6), 16) || 0;
  return `rgba(${r},${g},${b},${alpha})`;
}

function startResize(e, side) {
  e.preventDefault();
  const main = $('#main');
  if (!main) return;
  const mainRect = main.getBoundingClientRect();
  const startX = e.clientX;
  const startSidebar = state.sidebarWidth;
  const startPreview = state.previewWidth;
  const minPreview = getPreviewMinWidth();
  document.body.classList.add('resizing');

  function onMove(ev) {
    const dx = ev.clientX - startX;
    if (side === 'left') {
      const next = Math.max(180, Math.min(520, startSidebar + dx));
      state.sidebarWidth = next;
    } else {
      const next = Math.max(minPreview, Math.min(900, startPreview - dx));
      state.previewWidth = next;
    }
    main.style.gridTemplateColumns =
      `${state.sidebarWidth}px 6px minmax(0, 1fr) 6px ${state.previewWidth}px`;
    const sb = main.querySelector('.sidebar');
    if (sb) sb.style.width = state.sidebarWidth + 'px';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.classList.remove('resizing');
    persist();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function getPreviewMinWidth() {
  const card = document.querySelector('.preview-card');
  const body = document.querySelector('.preview-body');
  const cardWidth = card ? Math.ceil(card.getBoundingClientRect().width) : 470;
  const bodyStyle = body ? getComputedStyle(body) : null;
  const padLeft = bodyStyle ? parseFloat(bodyStyle.paddingLeft) || 0 : 14;
  const padRight = bodyStyle ? parseFloat(bodyStyle.paddingRight) || 0 : 14;
  return Math.ceil(cardWidth + padLeft + padRight + 2);
}

function renderTagFilterChips() {
  const expectedType = currentTagType();
  const allTags = new Set();
  state.templates
    .filter(t => (t.type || 'NCR') === expectedType)
    .forEach(t => (t.tags || []).forEach(tg => {
      const clean = String(tg || '').trim();
      if (clean) allTags.add(clean);
    }));
  if (allTags.size === 0) {
    state.tagFilter = '';
    return null;
  }

  const tags = Array.from(allTags).sort((a, b) =>
    a.localeCompare(b, undefined, { sensitivity: 'base' }));
  if (state.tagFilter && !allTags.has(state.tagFilter)) state.tagFilter = '';

  const wrap = el('div', { class: 'tag-filter-row' });
  wrap.appendChild(el('label', { class: 'tag-filter-label', for: 'tagFilterSelect' }, 'Tags:'));
  const select = el('select', {
    class: 'tag-filter-select',
    id: 'tagFilterSelect',
    value: state.tagFilter,
    onchange: e => {
      state.tagFilter = e.target.value;
      replaceTemplateList();
    }
  });
  select.appendChild(el('option', { value: '' }, 'All tags'));
  tags.forEach(tg => {
    select.appendChild(el('option', {
      value: tg,
      selected: state.tagFilter === tg ? 'selected' : null
    }, '#' + tg));
  });
  wrap.appendChild(select);
  return wrap;
}

function renderTagFilterRefresh() {
  const old = document.querySelector('.tag-filter-row');
  if (!old) return;
  const fresh = renderTagFilterChips();
  if (fresh) old.replaceWith(fresh);
  else old.remove();
}

function buildTemplateList() {
  const frag = document.createDocumentFragment();
  const q = state.search.trim().toLowerCase();
  const expectedType = currentTagType();

  const visible = state.templates
    .filter(t => (t.type || 'NCR') === expectedType)
    .filter(t => !q || textIndex(t).includes(q))
    .filter(t => !state.tagFilter || (t.tags || []).includes(state.tagFilter))
    .sort(templateComparator);

  if (state.activeTab !== 'NCOs') {
    if (visible.length === 0) {
      frag.appendChild(el('div', { class: 'empty-state' },
        state.search
          ? 'No matches'
          : 'No templates yet — fill one out and hit Save.'));
      return frag;
    }
    visible.forEach(t => frag.appendChild(renderTemplateCard(t, expectedType)));
    return frag;
  }

  const carrotVisible = state.carrotTemplates
    .filter(t => !q || carrotTextIndex(t).includes(q))
    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

  frag.appendChild(renderSidebarGroup(
    'NCO Tags',
    visible,
    state.search ? 'No matching NCO tags' : 'No NCO tags yet — fill one out and hit Save.',
    t => renderTemplateCard(t, expectedType)
  ));
  frag.appendChild(renderSidebarGroup(
    'Caret Templates',
    carrotVisible,
    state.search ? 'No matching caret templates' : 'No caret templates yet — save one from the Caret section.',
    renderCarrotTemplateCard
  ));

  return frag;
}

function renderSidebarGroup(title, items, emptyMessage, renderItem) {
  const group = el('div', { class: 'tag-list-group' });
  group.appendChild(el('div', { class: 'tag-list-group-title' }, title));
  if (items.length === 0) {
    group.appendChild(el('div', { class: 'tag-list-group-empty' }, emptyMessage));
    return group;
  }
  items.forEach(item => group.appendChild(renderItem(item)));
  return group;
}

function templateComparator(a, b) {
  // Pinned/favorited templates always float to the top.
  if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
  switch (state.sortMode) {
    case 'created':
      return (b.createdAt || 0) - (a.createdAt || 0);
    case 'name':
      return String(a.templateName || '').localeCompare(String(b.templateName || ''));
    case 'name-desc':
      return String(b.templateName || '').localeCompare(String(a.templateName || ''));
    case 'updated':
    default:
      return (b.updatedAt || 0) - (a.updatedAt || 0);
  }
}

function renderTemplateCard(t, expectedType) {
  const card = el('div', {
    class: 'tag-card'
      + (state.selectedId === t.id ? ' active' : '')
      + (t.pinned ? ' pinned-card' : ''),
    onclick: () => {
      if (state.selectedId === t.id) {
        // Click again on focused template -> unfocus (clear selection + builder)
        state.current = blankTagForType(currentTagType());
        state.selectedId = null;
        state.selectedCarrotId = null;
        state.previewSuppressed = false;
        state.carrotPreviewSuppressed = false;
        state.startTagMode = false;
        renderAll();
        return;
      }
      state.current = clone(t);
      state.selectedId = t.id;
      state.selectedCarrotId = t.carrotTemplateId || null;
      state.previewSuppressed = false;
      state.carrotPreviewSuppressed = false;
      state.startTagMode = false;
      renderAll();
    }
  });

  // Title (colorful gradient via CSS class)
  card.appendChild(el('div', { class: 'tag-card-title' },
    t.templateName || tagSummary(t) || 'Untitled'));

  // Inline tags display
  if ((t.tags || []).length) {
    const tagsRow = el('div', { class: 'tag-card-tags' });
    t.tags.slice(0, 4).forEach(tg => {
      tagsRow.appendChild(el('span', {
        class: 'tag-card-tag',
        onclick: e => {
          e.stopPropagation();
          state.tagFilter = state.tagFilter === tg ? '' : tg;
          renderAll();
        }
      }, '#' + tg));
    });
    if (t.tags.length > 4) {
      tagsRow.appendChild(el('span', { class: 'tag-card-tag more' }, '+' + (t.tags.length - 4)));
    }
    card.appendChild(tagsRow);
  }

  const actions = el('div', { class: 'tag-card-actions' });
  // Favorite (pin) toggle — sits inside the actions row, but always visible when pinned
  actions.appendChild(el('button', {
    class: 'tag-action tag-action-fav' + (t.pinned ? ' active-fav' : ''),
    title: t.pinned ? 'Unfavorite' : 'Favorite',
    onclick: e => {
      e.stopPropagation();
      t.pinned = !t.pinned;
      t.updatedAt = Date.now();
      persist();
      renderAll();
    }
  }, t.pinned ? '★' : '☆'));
  actions.appendChild(el('button', {
    class: 'tag-action',
    title: 'Rename template',
    onclick: e => {
      e.stopPropagation();
      renameTemplate(t.id);
    }
  }, '✎'));
  actions.appendChild(el('button', {
    class: 'tag-action delete',
    title: 'Delete template',
    html: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>',
    onclick: e => {
      e.stopPropagation();
      confirmTemplateDelete(t.id);
    }
  }));
  card.appendChild(actions);

  attachHoverPreview(card, t);
  return card;
}

function renderCarrotTemplateCard(t) {
  const isActive = state.selectedCarrotId === t.id && !state.carrotPreviewSuppressed;
  const card = el('div', {
    class: 'tag-card' + (isActive ? ' active' : ''),
    onclick: () => {
      if (state.selectedCarrotId === t.id) {
        state.current.carrotTemplateId = t.id;
        state.current.carrotTemplateName = state.current.carrotTemplateName || t.name || '';
        state.carrotPreviewSuppressed = !state.carrotPreviewSuppressed;
        renderAll();
        return;
      }
      state.selectedCarrotId = t.id;
      state.current.carrotTemplateId = t.id;
      state.current.carrotTemplateName = t.name || '';
      state.current.carrotsText = t.text || '';
      state.carrotPreviewSuppressed = false;
      state.startTagMode = false;
      renderAll();
    }
  });
  card.appendChild(el('div', { class: 'tag-card-title' }, t.name || 'Untitled'));

    onclick: e => {

function caretTemplatePreviewTag(t) {
  const preview = blankTagForType('NCO');
  preview.carrotTemplateName = t.name || '';
  preview.carrotsText = t.text || '';
  return preview;
}

// Returns true if a tag's updatedAt falls inside the chosen filter window.
function inDateRange(t, filter) {
  if (filter === 'all') return true;
  const day = 24 * 60 * 60 * 1000;
  const windows = { today: day, week: 7 * day, month: 30 * day };
  return Date.now() - t.updatedAt < windows[filter];
}

// Replace just the list when search changes — keeps focus on the search box.
function replaceTemplateList() {
  const list = $('#tagList');
  if (!list) return;
  list.innerHTML = '';
  list.appendChild(buildTemplateList());
}

function textIndex(t) {
  // Searchable string for a tag — combine all text fields.
  const measText = (i) => (i.measSections || []).flatMap(s =>
    [s.name, s.text]);
  const parts = [
    t.templateName,
    ...(t.tags || []),
    ...(t.drawings || []).flatMap(d => [d.number, d.sheet, d.rev, d.location, d.custom, d.type]),
    ...(t.processSpecs || []).flatMap(s => [s.number, s.section, s.rev]),
    ...(t.items || []).flatMap(i => [
      i.partNumber, i.description, i.discrepancy,
      ...measText(i),
      i.sbText
    ]),
    t.lso, t.lio,
    ...(t.otherBlocks || []).flatMap(o => [o.label, o.text]),
    t.carrotTemplateName, t.carrotsText
  ];
  return parts.filter(Boolean).join(' ').toLowerCase();
}

function carrotTextIndex(t) {
  return [t.name, t.text].filter(Boolean).join(' ').toLowerCase();
}

function tagSummary(t) {
  const item = t.items && t.items[0];
  const draw = t.drawings && t.drawings[0];
  if (item && item.partNumber) return `${item.partNumber} ${item.description || ''}`.trim();
  if (draw && (draw.number || draw.location)) return draw.number || draw.location;
  return 'Untitled';
}

/* ============================================================================
   RENDER — BUILDER (the form)
   ============================================================================ */
function renderBuilder() {
  const t = state.current;
  const wrap = el('section', { class: 'builder' });

  // Header
  const head = el('div', { class: 'builder-head' });
  const titleWrap = el('div', { class: 'builder-title-wrap' });
