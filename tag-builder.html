    titleWrap.appendChild(el('input', {
      class: 'builder-title-input',
      type: 'text',
      value: t.templateName || '',
      placeholder: 'Template Name',
      'aria-label': 'Template Name',
      oninput: e => { t.templateName = e.target.value; }
    }));
  }
  titleWrap.appendChild(renderTemplateActions());
  head.appendChild(titleWrap);

  wrap.appendChild(head);

  if (state.activeTab !== 'NCOs') {
    wrap.appendChild(el('div', { class: 'builder-divider', 'aria-hidden': 'true' }));
  }

  // ----- Header / Revision section -----
  const revSec = section('Header');
  const revRow = el('div', { class: 'row' });
  revRow.appendChild(field('Revision #', 'number', t.revisionNumber,
    v => { t.revisionNumber = parseInt(v) || 0; updatePreview(); }, { min: 0 }));
  revSec.appendChild(revRow);
  wrap.appendChild(revSec);

  // ----- Drawings -----
  const drawSec = section('Drawings');
  t.drawings.forEach((d, i) => drawSec.appendChild(renderDrawing(d, i)));
  drawSec.appendChild(el('button', {
    class: 'add-btn',
    onclick: () => openDrawingTypeModal(type => {
      t.drawings.push({ type, custom: '', number: '', sheet: '', rev: '', location: '' });
      renderAll();
    })
  }, '+ Add drawing'));
  wrap.appendChild(drawSec);

  // ----- Process Specs -----
  const specSec = section('Process Specs');
  t.processSpecs.forEach((s, i) => specSec.appendChild(renderSpec(s, i)));
  specSec.appendChild(el('button', {
    class: 'add-btn',
    onclick: () => { t.processSpecs.push({ number: '', section: '', rev: '' }); renderAll(); }
  }, '+ Add process spec'));
  wrap.appendChild(specSec);

  // ----- Items -----
  const itemSec = section('Items');
  t.items.forEach((it, i) => itemSec.appendChild(renderItem(it, i)));
  itemSec.appendChild(el('button', {
    class: 'add-btn',
    onclick: () => { t.items.push(blankItem(t.items.length + 1)); renderAll(); }
  }, '+ Add item'));
  wrap.appendChild(itemSec);

  // ----- Footer -----
  const footSec = section('Footer');
  const footRow = el('div', { class: 'row row-2' });
  footRow.appendChild(field('LSO - Last Shop Operation', 'text', t.lso,
    v => { t.lso = v; updatePreview(); }, { placeholder: '100/010', startTagHighlight: true }));
  footRow.appendChild(field('LIO - Last Inspection Operation', 'text', t.lio,
    v => { t.lio = v; updatePreview(); }, { placeholder: '110/010', startTagHighlight: true }));
  footSec.appendChild(footRow);

  const attRow = el('div', { class: 'row row-att' });
  const attLabel = el('label', { style: 'display:flex;gap:6px;align-items:center;font-size:12px;color:var(--text-muted);padding-bottom:8px' });
  const cb = el('input', {
    type: 'checkbox',
    onchange: e => { t.attachmentsEnabled = e.target.checked; updatePreview(); }
  });
  if (t.attachmentsEnabled) cb.checked = true;
  attLabel.appendChild(cb);
  attLabel.appendChild(document.createTextNode(' Include attachments line'));
  attRow.appendChild(attLabel);
  attRow.appendChild(field('Attachments text', 'text', t.attachmentsText,
    v => { t.attachmentsText = v; updatePreview(); }, { placeholder: '*See Attachments*' }));
  footSec.appendChild(attRow);
  wrap.appendChild(footSec);

  // ----- Other (free-form trailing notes) -----
  if (!Array.isArray(t.otherBlocks)) t.otherBlocks = [];
  if (t.otherBlocks.length > 0) {
    const otherSec = section('Other Notes');
    t.otherBlocks.forEach((o, i) => otherSec.appendChild(renderOtherBlock(o, i)));
    wrap.appendChild(otherSec);
  }
  const addOtherWrap = el('div', { class: 'add-other-wrap' });
  addOtherWrap.appendChild(el('button', {
    class: 'btn btn-add-other',
    onclick: () => {
      t.otherBlocks.push(blankOtherBlock(''));
      renderAll();
    }
  }, [
    el('span', { class: 'add-other-icon' }, '+'),
    el('span', {}, 'Add Other Text')
  ]));
  wrap.appendChild(addOtherWrap);

  // ----- Tags (chips) -----
  if (state.activeTab === 'NCRs') {
    wrap.appendChild(el('div', { class: 'other-tags-spacer', 'aria-hidden': 'true' }));
    wrap.appendChild(renderTagsEditor(t));
  }

  if (state.activeTab === 'NCOs') {
    wrap.appendChild(el('div', { class: 'builder-divider', 'aria-hidden': 'true' }));
    wrap.appendChild(renderCarrotsSection(t));
    wrap.appendChild(el('div', { class: 'other-tags-spacer', 'aria-hidden': 'true' }));
    wrap.appendChild(renderTagsEditor(t));
  }

  return wrap;
}

function renderOtherBlock(o, idx) {
  const t = state.current;
  const sub = el('div', { class: 'subsection other-block' });
  const head = el('div', { class: 'subsection-head other-block-head' });
  const labelWrap = el('div', { class: 'other-block-label-wrap' });
  labelWrap.appendChild(el('label', { class: 'other-block-label-tag' }, 'Label'));
  labelWrap.appendChild(el('input', {
    class: 'other-block-label-input',
    type: 'text',
    value: o.label || '',
    placeholder: 'e.g. Notes',
    'aria-label': 'Other block label',
    oninput: e => { o.label = e.target.value; updatePreview(); }
  }));
  head.appendChild(labelWrap);
  head.appendChild(el('button', {
    class: 'del-btn meas-section-del',
    title: 'Remove block',
    onclick: () => { t.otherBlocks.splice(idx, 1); renderAll(); }
  }, '×'));
  sub.appendChild(head);

  const ta = el('textarea', {
    class: 'other-block-text',
    placeholder: 'Type any additional notes here…',
    oninput: e => { o.text = e.target.value; updatePreview(); }
  });
  ta.value = o.text || '';
  sub.appendChild(ta);
  return sub;
}

function renderTagsEditor(t) {
  const sec = section('Tags');
  if (!Array.isArray(t.tags)) t.tags = [];
  const chips = el('div', { class: 'tag-chips-edit' });
  t.tags.forEach((tg, i) => {
    const chip = el('span', { class: 'tag-chip-edit' });
    chip.appendChild(el('span', {}, tg));
    chip.appendChild(el('button', {
      class: 'tag-chip-x',
      title: 'Remove tag',
      onclick: () => { t.tags.splice(i, 1); renderAll(); }
    }, '×'));
    chips.appendChild(chip);
  });
  const input = el('input', {
    class: 'tag-chip-input',
    type: 'text',
    placeholder: 'Add tag and press Enter…',
    onkeydown: e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const v = (e.target.value || '').trim().replace(/^#/, '');
        if (v && !t.tags.includes(v)) {
          t.tags.push(v);
          e.target.value = '';
          renderAll();
        } else {
          e.target.value = '';
        }
      } else if (e.key === 'Backspace' && !e.target.value && t.tags.length) {
        t.tags.pop();
        renderAll();
      }
    }
  });
  chips.appendChild(input);
  sec.appendChild(chips);
  return sec;
}

// Helper to build a section card with a title.
function section(title) {
  const sec = el('div', { class: 'section' });
  sec.appendChild(el('div', { class: 'section-head' }, [
    el('div', { class: 'section-title' }, title)
  ]));
  return sec;
}

// Generic input field — labeled input with an oninput callback.
function field(labelText, type, value, onInput, extra = {}) {
  const f = el('div', { class: 'field' });
  if (labelText) f.appendChild(el('label', {}, labelText));
  const input = el('input', {
    class: extra.startTagHighlight ? startTagHighlightClass(value) : null,
    type, value: value ?? '',
    placeholder: extra.placeholder || '',
    min: extra.min, max: extra.max,
    oninput: e => {
      // Auto-strip scanner prefixes on text inputs (number fields untouched).
      if (type === 'text' && state.scanPrefixStrip) {
        const stripped = stripScanPrefix(e.target.value);
        if (stripped !== e.target.value) e.target.value = stripped;
      }
      onInput(e.target.value);
      if (extra.startTagHighlight) syncStartTagHighlight(e.target, e.target.value);
    }
  });
  f.appendChild(input);
  return f;
}

// Multi-line field for longer text (discrepancy, S/B).
function textareaField(labelText, value, onInput, extra = {}) {
  const f = el('div', { class: 'field' });
  f.appendChild(el('label', {}, labelText));
  const ta = el('textarea', {
    class: extra.size === 'paragraph' ? 'tag-paragraph' : (extra.size === 'lg' ? 'lg' : null),
    placeholder: extra.placeholder || '',
    oninput: e => onInput(e.target.value)
  });
  ta.value = value || '';
  f.appendChild(ta);
  return f;
}

function renderDrawing(d, idx) {
  const t = state.current;
  const sub = el('div', { class: 'subsection' });
  const head = el('div', { class: 'subsection-head' });

  // Type select
  const typeSel = el('select', {

  });

  });

    sub.appendChild(field('Location', 'text', d.location || d.number,
      v => {
        d.location = v;
        d.number = '';
        d.sheet = '';
        d.rev = '';
        updatePreview();
      },

  const row = el('div', { class: 'row row-3' });

}

function renderSpec(s, idx) {
  const t = state.current;
  const sub = el('div', { class: 'subsection' });
  const head = el('div', { class: 'subsection-head' });
  head.appendChild(el('div', { class: 'subsection-title' },
    'Process Spec ' + (idx + 1)));
  if (t.processSpecs.length > 1) {
    head.appendChild(el('button', {
      class: 'del-btn',
      onclick: () => removeProcessSpec(idx)
    }, 'Remove'));
  }
  sub.appendChild(head);

  const row = el('div', { class: 'row row-3' });
  row.appendChild(field('Number', 'text', s.number,
    v => { s.number = v; updatePreview(); updateSpecRefControls(); }, { placeholder: 'BAC1234' }));
  row.appendChild(field('Section', 'text', s.section,
    v => { s.section = v; updatePreview(); updateSpecRefControls(); }, { placeholder: '11.1a' }));
  row.appendChild(field('Rev', 'text', s.rev,
    v => { s.rev = v; updatePreview(); }, { placeholder: 'A' }));
  sub.appendChild(row);

}

function removeProcessSpec(idx) {
  const t = state.current;
  (t.items || []).forEach(it => {
    it.sbAutoRefIndexes = normalizedAutoRefIndexes(it, t)
      .filter(refIdx => refIdx !== idx)
      .map(refIdx => refIdx > idx ? refIdx - 1 : refIdx);
  });
  t.processSpecs.splice(idx, 1);
  (t.items || []).forEach(it => {
    it.sbAutoRefIndexes = normalizedAutoRefIndexes(it, t);
  });
  renderAll();
}

function renderItem(it, idx) {
  const t = state.current;
  const sub = el('div', { class: 'subsection' });
  const head = el('div', { class: 'subsection-head' });
  const titleWrap = el('div', { class: 'subsection-title-wrap' });

    class: 'subsection-mini-input' + startTagHighlightClass(it.itemNumber),

    value: it.itemNumber || '',

    oninput: e => { it.itemNumber = e.target.value; updatePreview(); syncStartTagHighlight(e.target, e.target.value); }
  }));
  head.appendChild(titleWrap);
  if (t.items.length > 1) {
    head.appendChild(el('button', {
      class: 'del-btn',

    v => { it.countOf = v; updatePreview(); }, { placeholder: '1', startTagHighlight: true }));
  cnt.appendChild(field('Total Quantity', 'text', it.countTotal,

  sub.appendChild(cnt);

  // Part number + description
  const part = el('div', { class: 'row row-2' });
  part.appendChild(field('Part Number', 'text', it.partNumber,
    v => { it.partNumber = v; updatePreview(); }, { placeholder: '123Q1234-1', startTagHighlight: true }));
  part.appendChild(field('Item Description', 'text', it.description,
    v => { it.description = v; updatePreview(); }, { placeholder: 'Tube Assy', startTagHighlight: true }));

  // Discrepancy
  const discGroup = el('div', { class: 'inner-group' });

    onclick: () => {
      it.measSections.push(blankMeasSection('Section'));

  sub.appendChild(textareaField('S/B (What the Spec says it should be)', it.sbText,
    v => { it.sbText = v; updatePreview(); }, {
      size: 'paragraph',
      placeholder: 'No dents on the tube'

  sub.appendChild(renderSpecRefControl(it, t));

  return sub;

function renderSpecRefControl(it, t) {
  const wrap = el('div', { class: 'spec-ref-row' });
  wrap.appendChild(el('div', { class: 'spec-ref-label' }, 'Auto-reference Process Spec:'));

  const chips = el('div', { class: 'spec-ref-chips' });
  const specs = (t.processSpecs || []);
  const selected = normalizedAutoRefIndexes(it, t);

  specs.forEach((s, i) => {
    chips.appendChild(el('button', {
      class: 'spec-ref-chip' + (selected.includes(i) ? ' active' : ''),
      title: 'Toggle auto-reference for this spec',
      'aria-pressed': selected.includes(i) ? 'true' : 'false',
      'data-spec-ref-index': String(i),
      onclick: () => {
        const next = new Set(normalizedAutoRefIndexes(it, t));
        if (next.has(i)) next.delete(i);
        else next.add(i);
        it.sbAutoRefIndexes = Array.from(next).sort((a, b) => a - b);
        updatePreview();
        renderAll();
      }
    }, processSpecChipLabel(s, i)));
  });
  chips.appendChild(el('button', {
    class: 'spec-ref-chip spec-ref-off' + (selected.length === 0 ? ' active' : ''),
    title: 'Disable auto-reference',
    'aria-pressed': selected.length === 0 ? 'true' : 'false',
    onclick: () => { it.sbAutoRefIndexes = []; updatePreview(); renderAll(); }
  }, 'Off'));

  wrap.appendChild(chips);
  return wrap;
}

/* ============================================================================
   RENDER — PREVIEW
   ============================================================================ */
function renderPreview() {
  const wrap = el('aside', { class: 'preview-pane' });

  const head = el('div', { class: 'preview-head' });
  head.appendChild(el('div', { class: 'preview-title' }, 'Live Preview'));
  head.appendChild(el('button', {
    class: 'preview-start-btn',
    onclick: startMyTag
  }, 'Start my tag'));
  wrap.appendChild(head);

  const body = el('div', { class: 'preview-body' });
  const card = el('div', {
    class: 'preview-card'
      + (state.formattedPreview ? ' formatted-preview' : '')
      + (state.uppercaseText ? ' uppercase-text' : ''),
    id: 'previewCard'
  });
  card.innerHTML = currentPreviewHTML();
  body.appendChild(card);
  wrap.appendChild(body);

  const foot = el('div', { class: 'preview-foot' });
  foot.appendChild(el('button', {
    class: 'btn btn-primary btn-block', onclick: copyPreview, title: '⌘Enter'
  }, '📋 Copy to clipboard'));
  wrap.appendChild(foot);

  return wrap;
}

function startMyTag() {
  const t = state.current;

  (t.drawings || []).forEach(d => {
    if (d.number || d.sheet || d.rev) {
      d.number = '';
      d.sheet = '';
      d.rev = '';
    }
  });

  (t.items || []).forEach(it => {
    it.itemNumber = '';
    it.countOf = '';
    it.countTotal = '';
    it.partNumber = '';
    it.description = '';
  });

  t.lso = '';
  t.lio = '';
  state.startTagMode = true;
  state.previewSuppressed = false;
  state.carrotPreviewSuppressed = false;
  renderAll();
  toast('Starter fields cleared');
}

// Lightweight update — only the preview text, keeps form focus intact.
function updatePreview() {
  const c = $('#previewCard');
  if (c) {
    c.classList.toggle('formatted-preview', state.formattedPreview);
    c.classList.toggle('uppercase-text', state.uppercaseText);
    c.innerHTML = currentPreviewHTML();
  }
}

function currentPreviewHTML() {
  if (state.selectedId && state.previewSuppressed) {
    return `<span class="preview-placeholder">Click the selected template again to show its preview.</span>`;
  }
  return previewHTML(state.current);
}

function isCaretPreviewSuppressed(t = state.current) {
  if (t.type !== 'NCO' || !state.carrotPreviewSuppressed || !state.selectedCarrotId) {
    return false;
  }
  return !t.carrotTemplateId || t.carrotTemplateId === state.selectedCarrotId;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>]/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[ch]));
}

function joinPreviewTokens(tokens) {
  return tokens
    .map(token => token == null ? '' : String(token))
    .map(token => token.trim())
    .filter(token => token !== '')
    .join(' ')
    .trim();
}

function joinWithAnd(parts) {
  const clean = parts.map(p => String(p || '').trim()).filter(Boolean);
  if (clean.length <= 1) return clean[0] || '';
  if (clean.length === 2) return clean.join(' and ');
  return clean.slice(0, -1).join(', ') + ', and ' + clean[clean.length - 1];
}

function processSpecChipLabel(spec, index) {
  if (spec && (spec.number || spec.section)) {
    return [spec.number, spec.section ? 'Sec.' + spec.section : ''].filter(Boolean).join(' ');
  }
  return `Spec ${index + 1}`;
}

function processSpecReferenceText(spec) {
  if (!spec || (!spec.number && !spec.section && !spec.rev)) return '';
  return joinPreviewTokens([
    spec.number,
    spec.section ? `Sec.${spec.section}` : '',
    spec.rev ? `Rev.${spec.rev}` : ''
  ]);
}

function normalizedAutoRefIndexes(it, t = state.current) {
  if (!Array.isArray(it.sbAutoRefIndexes)) {
    if (typeof it.sbAutoRefIndex === 'number') {
      it.sbAutoRefIndexes = it.sbAutoRefIndex >= 0 ? [it.sbAutoRefIndex] : [];
    } else {
      it.sbAutoRefIndexes = it.sbAutoRef === false ? [] : [0];
    }
    delete it.sbAutoRef;
    delete it.sbAutoRefIndex;
  }
  const specs = t.processSpecs || [];
  const seen = new Set();
  const indexes = it.sbAutoRefIndexes
    .filter(idx => Number.isInteger(idx) && idx >= 0 && idx < specs.length)
    .filter(idx => {
      if (seen.has(idx)) return false;
      seen.add(idx);
      return true;
    })
    .sort((a, b) => a - b);
  if (indexes.length !== it.sbAutoRefIndexes.length ||
      indexes.some((idx, pos) => idx !== it.sbAutoRefIndexes[pos])) {
    it.sbAutoRefIndexes = indexes;
  }
  return indexes;
}

function updateSpecRefControls() {
  document.querySelectorAll('.spec-ref-chip[data-spec-ref-index]').forEach(btn => {
    const index = Number(btn.dataset.specRefIndex);
    btn.textContent = processSpecChipLabel((state.current.processSpecs || [])[index], index);
  });
}

function shouldStartTagHighlight(value) {
  return !!state.startTagMode && !String(value ?? '').trim();
}

function startTagHighlightClass(value) {
  return shouldStartTagHighlight(value) ? ' start-tag-required' : '';
}

function syncStartTagHighlight(control, value) {
  if (!control) return;
  control.classList.toggle('start-tag-required', shouldStartTagHighlight(value));
}

function hasPreviewInput(t) {
  const itemHasMeas = i =>
    (i.measSections || []).some(s => s.text);
  return (
    (t.revisionNumber || 0) > 0 ||
    (t.drawings || []).some(d => d.number || d.sheet || d.rev || d.location || d.custom) ||
    (t.processSpecs || []).some(s => s.number || s.section || s.rev) ||
    (t.items || []).some(i =>
      i.countOf || i.countTotal || i.partNumber || i.description ||
      i.discrepancy || itemHasMeas(i) || i.sbText
    ) ||
    t.lso || t.lio || t.carrotsText ||
    (t.otherBlocks || []).some(o => o.text || o.label)
  );
}

function buildPreviewBlocks(t) {
  const blocks = [];

  if (t.revisionNumber > 0) {
    blocks.push({ type: 'emphasis', lines: [`*Revision ${t.revisionNumber}*`] });
    blocks.push({ type: 'spacer' });
  }

  (t.drawings || []).forEach(d => {
    if (d.type === 'Other') {
      const text = joinPreviewTokens([d.location || d.number || '']);
      if (!text) return;
      blocks.push({
        type: 'inline',
        className: 'lbl',
        label: `${d.custom || 'Other Drawing'}:`,
        text
      });
      return;
    }
    if (!d.number && !d.sheet && !d.rev) return;
    const label =
      d.type === 'Engineering' ? 'Eng. Drawing' :
      d.type === 'Tool'        ? 'Tool Drawing' :
      d.type === 'Supplier'    ? 'Supplier Drawing' :
      (d.custom || 'Other Drawing');
    const text = joinPreviewTokens([
      d.number,
      d.sheet ? `Sht.${d.sheet}` : '',
      d.rev ? `Rev.${d.rev}` : ''
    ]);
    blocks.push({ type: 'inline', className: 'lbl', label: `${label}:`, text });
  });

  (t.processSpecs || []).forEach(p => {
    if (!p.number && !p.section && !p.rev) return;
    const text = joinPreviewTokens([
      p.number,
      p.section ? `Sec.${p.section}` : '',
      p.rev ? `Rev.${p.rev}` : ''
    ]);
    blocks.push({ type: 'inline', className: 'lbl', label: 'Process Spec:', text });
  });

  (t.items || []).forEach((it, i) => {
    const sections = it.measSections || [];
    const hasMeasContent = sections.some(s => s.text);
    const hasContent =
      it.countOf || it.countTotal ||
      it.partNumber || it.description || it.discrepancy ||
      hasMeasContent || it.sbText;
    if (!hasContent) return;

    if (blocks.length) blocks.push({ type: 'spacer' });

    const headerHasContent =
      it.countOf || it.countTotal ||
      it.partNumber || it.description || it.discrepancy;
    if (headerHasContent) {
      const countPart = (it.countOf || it.countTotal)
        ? `${it.countOf || ''} of ${it.countTotal || ''}`
        : '';
      const text = joinPreviewTokens([
        countPart,
        it.partNumber,
        it.description,
        it.discrepancy
      ]);
      blocks.push({
        type: 'inline',
        className: 'item-hdr',
        label: `Item ${it.itemNumber || String(i + 1)}:`,
        text
      });
    }

    sections.forEach(sec => {
      const hasText = !!(sec.text && String(sec.text).trim());
      if (!hasText) return;
      const sectionName = String(sec.name || '').trim();

      blocks.push({ type: 'spacer' });
      if (sectionName) {
        blocks.push({ type: 'heading', className: 'meas-hdr', label: sectionName, preserveCase: true });
      }
      blocks.push({ type: 'multiline', lines: String(sec.text).split('\n'), preserveCase: true });
    });

    if (it.sbText) {
      let ref = '';
      const refs = normalizedAutoRefIndexes(it, t)
        .map(idx => processSpecReferenceText((t.processSpecs || [])[idx]))
        .filter(Boolean);
      if (refs.length) {
        ref = ` per ${joinWithAnd(refs)}`;
      }
      blocks.push({ type: 'spacer' });
      blocks.push({
        type: 'inline',
        className: 'lbl',
        label: 'S/B:',
        text: `${it.sbText}${ref}`
      });
    }
  });

  if (t.lso || t.lio) {
    blocks.push({ type: 'spacer' });
    if (t.lso) blocks.push({ type: 'inline', className: 'lbl', label: 'LSO:', text: t.lso });
    if (t.lio) blocks.push({ type: 'inline', className: 'lbl', label: 'LIO:', text: t.lio });
  }

  if (t.attachmentsEnabled && t.attachmentsText) {
    blocks.push({ type: 'spacer' });
    blocks.push({ type: 'emphasis', lines: String(t.attachmentsText).split('\n') });
  }

  (t.otherBlocks || []).forEach(o => {
    if (!o || (!o.text && !o.label)) return;
    blocks.push({ type: 'spacer' });
    const label = String(o.label || '').trim();
    if (label) {
      blocks.push({ type: 'heading', className: 'meas-hdr', label });
    }
    if (o.text) {
      blocks.push({ type: 'multiline', lines: String(o.text).split('\n') });
    }
  });

  if (t.type === 'NCO' && t.carrotsText && !isCaretPreviewSuppressed(t)) {
    blocks.push({ type: 'spacer' });
    blocks.push({ type: 'multiline', lines: String(t.carrotsText).split('\n') });
  }

  return blocks;
}

function applyPreviewCase(text, block) {
  const source = String(text ?? '');
  return state.uppercaseText && !(block && block.preserveCase)
    ? source.toUpperCase()
    : source;
}

function preservePreviewCase(html, block) {
  return block && block.preserveCase
    ? `<span class="preview-preserve-case">${html}</span>`
    : html;
}

function renderPreviewRichText(text, block) {
  const html = escapeHtml(applyPreviewCase(text, block)).replace(/\*([^*]+)\*/g, '<em>*$1*</em>');
  return preservePreviewCase(html, block);
}

const FORMATTED_PREVIEW_WIDTH = 51;

function renderPreviewClassic(blocks) {
  const lines = [];
  blocks.forEach(block => {
    if (block.type === 'spacer') {
      lines.push('');
      return;
    }
    if (block.type === 'inline') {
      const labelClass = block.className || 'lbl';
      const label = `<span class="${labelClass}">${escapeHtml(applyPreviewCase(block.label, block))}</span>`;
      lines.push(joinPreviewTokens([label, escapeHtml(applyPreviewCase(block.text, block))]));
      return;
    }
    if (block.type === 'heading') {
      const html = `<span class="${block.className || 'meas-hdr'}">${escapeHtml(applyPreviewCase(block.label, block))}</span>`;
      lines.push(preservePreviewCase(html, block));
      return;
    }
    if (block.type === 'text') {
      lines.push(preservePreviewCase(escapeHtml(applyPreviewCase(block.text, block)), block));
      return;
    }
    if (block.type === 'multiline') {
      block.lines.forEach(line => lines.push(preservePreviewCase(escapeHtml(applyPreviewCase(line, block)), block)));
      return;
    }
    if (block.type === 'emphasis') {
      block.lines.forEach(line => lines.push(renderPreviewRichText(line, block)));
    }
  });
  return lines.join('\n');
}

function wrapIndentedText(text, firstIndent, nextIndent, width = FORMATTED_PREVIEW_WIDTH) {
  const source = String(text || '');
  if (!source.trim()) return [firstIndent.trimEnd()];

  const parts = source.match(/\S+\s*|\s+/g) || [];
  const lines = [];
  let current = firstIndent;

  parts.forEach(part => {
    if (current === firstIndent || current === nextIndent) {
      current += part.replace(/^\n+|\n+$/g, '');
      return;
    }
    if ((current + part).length <= width) {
      current += part;
      return;
    }
    lines.push(current.trimEnd());
    current = nextIndent + part.replace(/^\s+/, '');
  });

  lines.push(current.trimEnd());
  return lines;
}

function wrapPlainText(text, width = FORMATTED_PREVIEW_WIDTH) {
  return wrapIndentedText(text, '', '', width).map(line => line.trimEnd());
}

function renderFormattedInlineBlock(block) {
  const labelText = applyPreviewCase(block.label || '', block);
  const firstIndent = labelText + ' ';
  const nextIndent = ' '.repeat(firstIndent.length);
  const lines = wrapIndentedText(applyPreviewCase(block.text, block), firstIndent, nextIndent);
  return lines.map((line, idx) => {
    const html = idx !== 0
      ? escapeHtml(line)
      : `<span class="${block.className || 'lbl'} preview-inline-label">${escapeHtml(labelText)}</span> ${escapeHtml(line.slice(firstIndent.length))}`;
    return preservePreviewCase(html, block);
  });
}

function renderPreviewFormatted(blocks) {
  const lines = [];

  blocks.forEach(block => {
    if (block.type === 'spacer') {
      lines.push('');
      return;
    }
    if (block.type === 'inline') {
      renderFormattedInlineBlock(block).forEach(line => lines.push(line));
      return;
    }
    if (block.type === 'heading') {
      wrapPlainText(applyPreviewCase(block.label, block)).forEach((line, idx) => {
        const html = idx === 0
          ? `<span class="${block.className || 'meas-hdr'}">${escapeHtml(line)}</span>`
          : escapeHtml(line);
        lines.push(preservePreviewCase(html, block));
      });
      return;
    }
    if (block.type === 'text') {
      wrapPlainText(applyPreviewCase(block.text, block)).forEach(line => lines.push(preservePreviewCase(escapeHtml(line), block)));
      return;
    }
    if (block.type === 'multiline') {
      block.lines.forEach(line => wrapPlainText(applyPreviewCase(line, block)).forEach(wrapped => lines.push(preservePreviewCase(escapeHtml(wrapped), block))));
      return;
    }
    if (block.type === 'emphasis') {
      block.lines.forEach(line => wrapPlainText(applyPreviewCase(line, block)).forEach(wrapped => lines.push(renderPreviewRichText(wrapped, block))));
    }
  });

  return lines.join('\n');
}

function previewText(blocks) {
  const lines = [];
  blocks.forEach(block => {
    if (block.type === 'spacer') {
      lines.push('');
      return;
    }
    if (block.type === 'inline') {
      const firstIndent = applyPreviewCase(block.label || '', block) + ' ';
      const nextIndent = ' '.repeat(firstIndent.length);
      wrapIndentedText(applyPreviewCase(block.text, block), firstIndent, nextIndent).forEach(line => lines.push(line));
      return;
    }
    if (block.type === 'heading') {
      wrapPlainText(applyPreviewCase(block.label, block)).forEach(line => lines.push(line));
      return;
    }
    if (block.type === 'text') {
      wrapPlainText(applyPreviewCase(block.text, block)).forEach(line => lines.push(line));
      return;
    }
    if (block.type === 'multiline' || block.type === 'emphasis') {
      block.lines.forEach(line => wrapPlainText(applyPreviewCase(line, block)).forEach(wrapped => lines.push(wrapped)));
    }
  });
  return lines.join('\n');
}

// Build the preview text from current tag state. Output mirrors the user's
// example format exactly: Eng. Drawing line, Process Spec line, Item line(s),
// Measurements, S/B with auto-reference, LSO/LIO, attachments.
function previewHTML(t) {
  if (!hasPreviewInput(t)) {
    return `<span class="preview-placeholder">Start typing to show live preview.</span>`;
  }
  const blocks = buildPreviewBlocks(t);
  return state.formattedPreview ? renderPreviewFormatted(blocks) : renderPreviewClassic(blocks);
}

// Plain text for the clipboard.
function previewPlainText(t) {
  return hasPreviewInput(t)
    ? previewText(buildPreviewBlocks(t))
    : 'Start typing to show live preview.';
}

function copyPreview() {
  const text = previewPlainText(state.current);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => toast('Copied to clipboard'),
      () => fallbackCopy(text)
    );
  } else fallbackCopy(text);
}

function fallbackCopy(text) {
  // For older browsers / restricted environments. Uses a hidden textarea.
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast('Copied to clipboard'); }
  catch (e) { toast('Copy failed — select & copy manually'); }
  ta.remove();
}

/* ============================================================================
   ACTIONS — save / duplicate / delete / rename templates
   ============================================================================ */
function saveTemplate() {
  const t = state.current;
  const name = (t.templateName || '').trim();
  if (!name) {
    toast('Name the template first');
    return;
  }

  openModal('Save template', [
    el('div', {
      class: 'field-hint',
      style: 'white-space:normal;line-height:1.5'
    }, `Do you want to create a new template named "${name}" or update the current template?`)
  ], [
    el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
    el('button', {
      class: 'btn btn-primary',
      onclick: createNewTemplate
    }, 'Create New'),
    el('button', {
      class: 'btn btn-primary',
      onclick: updateCurrentTemplate
    }, 'Update Current Tag')
  ]);
}

function prepareCurrentTemplateForSave() {
  const t = state.current;
  const name = (t.templateName || '').trim();
  if (!name) {
    toast('Name the template first');
    return null;
  }

  t.templateName = name;
  t.type = currentTagType();
  t.carrotTemplateId = state.activeTab === 'NCOs' ? (state.selectedCarrotId || null) : null;
  t.createdAt = t.createdAt || Date.now();
  t.updatedAt = Date.now();
  return t;
}

function updateCurrentTemplate() {
  const t = prepareCurrentTemplateForSave();
  if (!t) return;
  const idx = state.templates.findIndex(x => x.id === t.id);
  if (idx >= 0) state.templates[idx] = clone(t);
  else state.templates.unshift(clone(t));
  state.selectedId = t.id;
  closeModal();
  persist();
  toast(idx >= 0 ? 'Template updated' : 'Template saved');
  renderAll();
}

function createNewTemplate() {
  const t = prepareCurrentTemplateForSave();
  if (!t) return;

  const fresh = clone(t);
  fresh.id = blankTagForType(currentTagType()).id;
  fresh.createdAt = Date.now();
  fresh.updatedAt = Date.now();
  state.templates.unshift(clone(fresh));
  state.current = fresh;
  state.selectedId = fresh.id;
  state.previewSuppressed = false;
  state.carrotPreviewSuppressed = false;
  pushHistory({
    type: 'create-template',
    label: 'Create "' + (fresh.templateName || 'Untitled') + '"',
    payload: clone(fresh)
  });
  closeModal();
  persist();
  renderAll();
  actionToast('Template created', 'Undo', performUndo);
}

function saveCarrotTemplate() {
  if (state.activeTab !== 'NCOs') return;
  const name = (state.current.carrotTemplateName || '').trim();
  const text = state.current.carrotsText || '';
  if (!name) {
    toast('Name the caret template first');
    return;
  }
  if (!text.trim()) {
    toast('Add caret text first');
    return;
  }

  const id = state.selectedCarrotId || ('carrot_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6));
  const next = {
    id,
    name,
    text,
    createdAt: state.carrotTemplates.find(x => x.id === id)?.createdAt || Date.now(),
    updatedAt: Date.now()
  };
  const idx = state.carrotTemplates.findIndex(x => x.id === id);
  const wasNew = idx < 0;
  if (idx >= 0) state.carrotTemplates[idx] = next;
  else state.carrotTemplates.unshift(next);
  state.selectedCarrotId = id;
  state.current.carrotTemplateId = id;
  state.current.carrotTemplateName = name;
  if (wasNew) {
    pushHistory({
      type: 'create-caret',
      label: 'Create caret "' + name + '"',
      payload: clone(next)
    });
  }
  persist();
  renderAll();
  if (wasNew) actionToast('Caret template saved', 'Undo', performUndo);
  else toast('Caret template updated');
}

function duplicateTemplate() {
  const name = (state.current.templateName || '').trim() || 'Untitled';
  openModal('Duplicate template?', [
    el('div', {
      class: 'field-hint',
      style: 'white-space:normal;line-height:1.5'
    }, `Are you sure you want to duplicate this template? "${name}" will be copied into the template list.`)
  ], [
    el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
    el('button', {
      class: 'btn btn-primary',
      onclick: confirmDuplicateTemplate
    }, 'Duplicate')
  ]);
}

function confirmDuplicateTemplate() {
  createNewTemplate();
}

function renameTemplate(templateId) {
  const template = state.templates.find(x => x.id === templateId);
  if (!template) return;

  const nextName = prompt('Rename template', template.templateName || '');
  if (nextName == null) return;

  const name = nextName.trim();
  if (!name) {
    toast('Template name cannot be empty');
    return;
  }

  template.templateName = name;
  template.updatedAt = Date.now();
  if (state.selectedId === templateId) {
    state.current.templateName = name;
    state.current.updatedAt = template.updatedAt;
  }
  persist();
  toast('Template renamed');
  renderAll();
}

function renameCarrotTemplate(templateId) {
  const template = state.carrotTemplates.find(x => x.id === templateId);
  if (!template) return;

  const nextName = prompt('Rename caret template', template.name || '');
  if (nextName == null) return;

  const name = nextName.trim();
  if (!name) {
    toast('Caret template name cannot be empty');
    return;
  }

  template.name = name;
  template.updatedAt = Date.now();
  if (state.selectedCarrotId === templateId) {
    state.current.carrotTemplateName = name;
  }
  persist();
  toast('Caret template renamed');
  renderAll();
}

function recordTemplateDeletion(template, bemsid) {
  state.deletionHistory.unshift({
    id: 'del_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    title: template.templateName || tagSummary(template) || 'Untitled',
    bemsid: String(bemsid || '').trim(),
    deletedAt: Date.now(),
    type: template.type || currentTagType()
  });
}

function deleteTemplateById(templateId, bemsid = '') {
  const idx = state.templates.findIndex(x => x.id === templateId);
  const removed = idx >= 0 ? clone(state.templates[idx]) : null;
  state.templates = state.templates.filter(x => x.id !== templateId);
  if (state.selectedId === templateId) {
    state.current = blankTagForType(currentTagType());
    state.selectedId = null;
    state.selectedCarrotId = null;
    state.previewSuppressed = false;
    state.carrotPreviewSuppressed = false;
  }
  if (removed) {
    recordTemplateDeletion(removed, bemsid);
    pushHistory({
      type: 'delete-template',
      label: 'Delete "' + (removed.templateName || 'Untitled') + '"',
      payload: { template: removed, index: idx }
    });
  }
  closeModal();
  persist();
  renderAll();
  if (removed) {
    actionToast('Template deleted', 'Undo', performUndo);
  } else {
    toast('Template deleted');
  }
}

function deleteCarrotTemplateById(templateId) {
  const idx = state.carrotTemplates.findIndex(x => x.id === templateId);
  const removed = idx >= 0 ? clone(state.carrotTemplates[idx]) : null;
  state.carrotTemplates = state.carrotTemplates.filter(x => x.id !== templateId);
  if (state.selectedCarrotId === templateId) {
    state.selectedCarrotId = null;
    state.current.carrotTemplateId = null;
    state.current.carrotTemplateName = '';
    state.carrotPreviewSuppressed = false;
  }
  if (removed) {
    pushHistory({
      type: 'delete-caret',
      label: 'Delete caret "' + (removed.name || 'Untitled') + '"',
      payload: { template: removed, index: idx }
    });
  }
  closeModal();
  persist();
  renderAll();
  if (removed) {
    actionToast('Caret template deleted', 'Undo', performUndo);
  } else {
    toast('Caret template deleted');
  }
}

function confirmTemplateDelete(templateId) {
  const template = state.templates.find(x => x.id === templateId);
  if (!template) return;
  const name = template.templateName || 'Untitled';

  openModal('Delete template?', [
    el('div', {
      class: 'field-hint',

    }, `Delete "${name}" from the template list?`)
  ], [

    el('button', {

function confirmCarrotTemplateDelete(templateId) {
  const template = state.carrotTemplates.find(x => x.id === templateId);
  if (!template) return;
  const name = template.name || 'Untitled';

  openModal('Delete caret template?', [
    el('div', {
      class: 'field-hint',
      style: 'white-space:normal;line-height:1.5'
    }, `Delete caret template "${name}" from the NCO sidebar?`)
  ], [
    el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
    el('button', {
      class: 'btn btn-danger',
      onclick: () => confirmCarrotTemplateDeleteFinal(templateId)
    }, 'Continue')
  ]);
}

function confirmTemplateDeleteFinal(templateId) {
  const template = state.templates.find(x => x.id === templateId);
  if (!template) {
    closeModal();
    return;
  }
  const name = template.templateName || 'Untitled';
  const passwordId = 'deletePassword_' + templateId;
  const bemsidId = 'deleteBemsid_' + templateId;

  openModal('Final confirmation', [
    el('div', {
      class: 'field-hint',
      style: 'white-space:normal;line-height:1.5'
    }, `"${name}" will be permanently deleted. Enter the delete password and your BEMSID to continue.`),
    el('div', { class: 'field' }, [
      el('label', { for: passwordId }, 'Password'),
      el('input', {
        id: passwordId,
        type: 'password',
        placeholder: 'Delete password',
        autocomplete: 'off'
      })
    ]),
    el('div', { class: 'field' }, [
      el('label', { for: bemsidId }, 'BEMSID'),
      el('input', {

        type: 'number',
        inputmode: 'numeric',

        oninput: e => { e.target.value = String(e.target.value || '').replace(/\D/g, ''); }

    el('button', {
      class: 'btn btn-danger',
      onclick: () => authorizeTemplateDelete(templateId, passwordId, bemsidId)
    }, 'Delete template')

}

function authorizeTemplateDelete(templateId, passwordId, bemsidId) {
  const password = (document.getElementById(passwordId)?.value || '').trim();
  const bemsid = (document.getElementById(bemsidId)?.value || '').trim();
  if (!/^\d+$/.test(bemsid)) {
    toast('Enter a numeric BEMSID with the password');

  }
  if (password !== 'TDRCQA') {
    toast('Incorrect delete password');
    return;
  }
  deleteTemplateById(templateId, bemsid);
}

function confirmCarrotTemplateDeleteFinal(templateId) {
  const template = state.carrotTemplates.find(x => x.id === templateId);

    closeModal();
    return;

  const name = template.name || 'Untitled';

      style: 'white-space:normal;line-height:1.5'
    }, `Caret template "${name}" will be permanently deleted. This cannot be undone.`)
  ], [
    el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),

    }, 'Delete caret template')

}

/* ============================================================================
   IMPORT / EXPORT JSON — for moving tags between machines
   ============================================================================ */
function exportAll() {
  const data = {
    version: 1,
    savedAt: new Date().toISOString(),
    activeTheme: state.activeTheme,
    customThemes: state.customThemes,
    tags: state.tags,
    templates: state.templates,
    carrotTemplates: state.carrotTemplates,
    deletionHistory: state.deletionHistory
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = el('a', { href: url, download: 'tag-builder-' + Date.now() + '.json' });
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Exported');
}

function applyImportedJsonData(data) {
  const incoming = data.tags || [];
  const incomingTpl = data.templates || [];
  const incomingCarrots = data.carrotTemplates || [];
  const incomingDeleteHistory = data.deletionHistory || [];
  const incomingCustomThemes = data.customThemes || [];
  // Merge by id (incoming wins on conflict).
  const byId = new Map(state.tags.map(t => [t.id, t]));
  incoming.forEach(t => byId.set(t.id, migrateTag(t)));
  state.tags = Array.from(byId.values());
  const tplById = new Map(state.templates.map(t => [t.id, t]));
  incomingTpl.forEach(t => tplById.set(t.id, migrateTag(t)));
  state.templates = Array.from(tplById.values());
  const carrotById = new Map(state.carrotTemplates.map(t => [t.id, t]));
  incomingCarrots.forEach(t => carrotById.set(t.id, t));
  state.carrotTemplates = Array.from(carrotById.values());
  const deleteById = new Map((state.deletionHistory || []).map(t => [t.id, t]));
  incomingDeleteHistory.forEach((t, i) => {
    const row = {
      id: t.id || ('imported_del_' + Date.now() + '_' + i),
      title: t.title || 'Untitled',
      bemsid: t.bemsid || '',
      deletedAt: t.deletedAt || Date.now(),
      type: t.type || ''
    };
    deleteById.set(row.id, row);
  });
  state.deletionHistory = Array.from(deleteById.values());
  const customById = new Map((state.customThemes || []).map(t => [t.id, t]));
  incomingCustomThemes.forEach((t, i) => {
    const theme = normalizeCustomTheme({
      ...t,
      id: t.id || ('imported_theme_' + Date.now() + '_' + i)
    });
    customById.set(theme.id, theme);
  });
  state.customThemes = Array.from(customById.values());
  if (data.activeTheme) state.activeTheme = data.activeTheme;
  return {
    tags: incoming.length,
    templates: incomingTpl.length,
    carrotTemplates: incomingCarrots.length
  };
}

function bakedJsonHash(text) {
  let hash = 0;
  for (let i = 0; i < text.length; i++) {
    hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
  }
  return String(hash);
}

function applyBakedInJson() {
  const raw = String(BAKED_IN_JSON || '').trim();
  if (!raw || raw === 'Paste JSON here') return;
  const hash = bakedJsonHash(raw);
  if (localStorage.getItem(STORAGE_KEY + '.bakedJsonHash') === hash) return;
  try {
    applyImportedJsonData(JSON.parse(raw));
    localStorage.setItem(STORAGE_KEY + '.bakedJsonHash', hash);
    persist();
  } catch (err) {
    console.warn('Baked-in JSON was not loaded:', err);
  }
}

function importFile(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const counts = applyImportedJsonData(data);
      persist();
      toast(`Imported ${counts.tags} tags, ${counts.templates} templates, and ${counts.carrotTemplates} caret templates`);
      renderAll();
    } catch (err) {
      alert('Invalid JSON: ' + err.message);
    }
  };
  r.readAsText(file);
}

function isJsonFile(file) {
  if (!file) return false;
  const name = String(file.name || '').toLowerCase();
  return file.type === 'application/json' || name.endsWith('.json');
}

/* ============================================================================
   GUIDES TAB — multiple PDF tabs, loaded from disk via file picker
   PDFs persist for the session only (object URLs are not durable).
   Tip: keep your team's guides in a shared folder so anyone can pick the
   same files.
   ============================================================================ */
function renderGuides() {
  const wrap = el('section', { class: 'guides' });
  const tabs = el('div', { class: 'guides-tabs' });

  state.guides.forEach((g, i) => {
    const isActive = i === state.activeGuideIdx;
    const t = el('div', {
      class: 'guide-tab' + (isActive ? ' active' : ''),
      onclick: () => { state.activeGuideIdx = i; renderAll(); }
    });
    t.appendChild(document.createTextNode(g.name));
    t.appendChild(el('span', {
      class: 'x',
      onclick: e => {
        e.stopPropagation();
        URL.revokeObjectURL(state.guides[i].url);
        state.guides.splice(i, 1);
        if (state.activeGuideIdx >= state.guides.length)
          state.activeGuideIdx = Math.max(0, state.guides.length - 1);
        renderAll();
      }
    }, '×'));
    tabs.appendChild(t);
  });

  tabs.appendChild(el('button', {
    class: 'btn btn-ghost',
    onclick: () => $('#filePdf').click()
  }, '+ Add PDF'));
  wrap.appendChild(tabs);

  const view = el('div', { class: 'guide-viewer' });
  if (state.guides.length === 0) {
    view.appendChild(el('div', { class: 'empty-state' }, [
      el('h3', { style: 'margin-bottom:8px;color:var(--text);font-size:18px' }, 'Team Guides'),
      el('div', {}, 'Click "+ Add PDF" to load one or more PDFs from disk.'),
      el('div', { style: 'margin-top:12px;font-size:12px;max-width:480px;margin-left:auto;margin-right:auto' },
        'Tip: keep guides on a shared folder (OneDrive / SharePoint / network drive) so everyone picks the same source. PDFs aren\'t saved into this file — they load fresh each session.')
    ]));
  } else {
    const g = state.guides[state.activeGuideIdx];
    const frame = el('iframe', { src: g.url });
    // Make iframe fill remaining viewport height
    frame.style.height = 'calc(100vh - 130px)';
    view.appendChild(frame);
  }
  wrap.appendChild(view);
  return wrap;
}

/* ============================================================================
   GLOBAL EVENTS — theme toggle, file inputs, keyboard shortcuts
   ============================================================================ */
function setupGlobalEvents() {
  let dragDepth = 0;

  // Theme picker show/hide
  $('#themeBtn').addEventListener('click', e => {
    e.stopPropagation();
    $('#themePicker').classList.toggle('show');
  });
  document.addEventListener('click', e => {
    if (!$('#themePicker').contains(e.target) && e.target !== $('#themeBtn'))
      $('#themePicker').classList.remove('show');
  });
  $$('#themePicker .theme-opt[data-theme]').forEach(b => {
    b.addEventListener('click', e => {
      const sw = b.querySelector('.theme-swatch');
      const bg = sw ? sw.style.background : '';
      applyThemeWithRipple(b.dataset.theme, e.clientX, e.clientY, bg);
      $('#themePicker').classList.remove('show');
    });
  });
  $('#createThemeBtn').addEventListener('click', () => {
    $('#themePicker').classList.remove('show');
    openThemeBuilder(null);
  });
  renderCustomThemes();

  // Modal: backdrop click closes
  $('#modalBackdrop').addEventListener('click', e => {
    if (e.target === $('#modalBackdrop')) closeModal();
  });

  // Fullscreen + preview text toggles
  $('#focusBtn').addEventListener('click', toggleFullscreen);
  $('#formatBtn').addEventListener('click', toggleFormattedPreview);
  $('#uppercaseBtn').addEventListener('click', toggleUppercaseText);
  if (state.formattedPreview) $('#formatBtn').classList.add('feature-on');
  if (state.uppercaseText) $('#uppercaseBtn').classList.add('feature-on');

  // Undo / Redo buttons
  $('#undoBtn').addEventListener('click', performUndo);
  $('#redoBtn').addEventListener('click', performRedo);
  renderUndoButton();

  // Hidden file input is triggered from the sidebar Import button.
  $('#fileImport').addEventListener('change', e => {
    const f = e.target.files && e.target.files[0];
    if (f) importFile(f);
    e.target.value = '';
  });
  $('#filePdf').addEventListener('change', e => {
    const files = Array.from(e.target.files || []);
    files.forEach(f => state.guides.push({ name: f.name, url: URL.createObjectURL(f) }));
    if (files.length) state.activeGuideIdx = state.guides.length - files.length;
    e.target.value = '';
    renderAll();
  });

  function setDropOverlay(show) {
    document.body.classList.toggle('drag-importing', show);
    const overlay = $('#dropOverlay');
    if (overlay) overlay.setAttribute('aria-hidden', show ? 'false' : 'true');
  }
  function fileDragEvent(e) {
    return !!(e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files'));
  }

  document.addEventListener('dragenter', e => {
    if (!fileDragEvent(e)) return;
    e.preventDefault();
    dragDepth++;
    setDropOverlay(true);
  });
  document.addEventListener('dragover', e => {
    if (!fileDragEvent(e)) return;
    e.preventDefault();
    if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
    setDropOverlay(true);
  });
  document.addEventListener('dragleave', e => {
    if (!fileDragEvent(e)) return;
    dragDepth = Math.max(0, dragDepth - 1);
    if (dragDepth === 0) setDropOverlay(false);
  });
  document.addEventListener('drop', e => {
    if (!fileDragEvent(e)) return;
    e.preventDefault();
    dragDepth = 0;
    setDropOverlay(false);
    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    if (!isJsonFile(file)) {
      toast('Drop a JSON export file');
      return;
    }
    importFile(file);
  });
  document.addEventListener('fullscreenchange', syncFeatureButtons);

  // Keyboard shortcuts (works great with BetterTouchTool gestures too):
  //   ⌘/Ctrl + S      Save
  //   ⌘/Ctrl + D      Duplicate current tag
  //   ⌘/Ctrl + Enter  Copy preview to clipboard
  document.addEventListener('keydown', e => {
    const meta = e.metaKey || e.ctrlKey;
    // ⌘Z / ⌘⇧Z — undo / redo (works on any tab)
    if (meta && (e.key === 'z' || e.key === 'Z')) {
      // Don't fight typed undo inside an editable field
      const target = e.target;
      const inEditable = target && (
        target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' ||
        target.isContentEditable
      );
      if (!inEditable) {
        e.preventDefault();
        if (e.shiftKey) performRedo(); else performUndo();
        return;
      }
    }
    // ⌘. — browser fullscreen (works on any tab)
    if (meta && e.key === '.') { e.preventDefault(); toggleFullscreen(); return; }
    if (!['NCRs', 'NCOs'].includes(state.activeTab)) return;
    if (meta && e.key.toLowerCase() === 's') { e.preventDefault(); saveTemplate(); }
    else if (meta && e.key.toLowerCase() === 'd') { e.preventDefault(); duplicateTemplate(); }
    else if (meta && e.key === 'Enter') { e.preventDefault(); copyPreview(); }
  });
}

/* ============================================================================
   RENDER LOOP — call this any time state changes structurally
   Preserves scroll positions on the builder, sidebar, and preview pane so
   clicking a template (or any other re-render trigger) doesn't snap to top.
   ============================================================================ */
function captureScrollPositions() {
  const builder = document.querySelector('.builder');
  const list = document.querySelector('.tag-list');
  const preview = document.querySelector('.preview-body');
  return {
    builder: builder ? builder.scrollTop : 0,
    list: list ? list.scrollTop : 0,
    preview: preview ? preview.scrollTop : 0
  };
}
function restoreScrollPositions(saved) {
  if (!saved) return;
  requestAnimationFrame(() => {
    const builder = document.querySelector('.builder');
    const list = document.querySelector('.tag-list');
    const preview = document.querySelector('.preview-body');
    if (builder) builder.scrollTop = saved.builder;
    if (list) list.scrollTop = saved.list;
    if (preview) preview.scrollTop = saved.preview;
  });
}

function renderAll() {
  const savedScroll = captureScrollPositions();
  applyTheme();
  renderTabs();
  renderMain();
  renderUndoButton();
  syncFeatureButtons();
  restoreScrollPositions(savedScroll);
}

function syncFeatureButtons() {
  const focusBtn = $('#focusBtn');
  const formatBtn = $('#formatBtn');
  const uppercaseBtn = $('#uppercaseBtn');
  if (focusBtn) focusBtn.classList.toggle('feature-on', !!document.fullscreenElement);
  if (formatBtn) formatBtn.classList.toggle('feature-on', state.formattedPreview);
  if (uppercaseBtn) uppercaseBtn.classList.toggle('feature-on', state.uppercaseText);
}

function renderCustomThemes() {
  const list = $('#customThemesList');
  if (!list) return;
  list.innerHTML = '';
  if (state.customThemes.length === 0) {
    list.appendChild(el('div', { class: 'ct-empty' }, 'No custom themes yet'));
    return;
  }
  state.customThemes.forEach(ct => {
    const row = el('div', { class: 'ct-row' });
    const opt = el('button', {
      class: 'theme-opt', 'data-custom': ct.id,
      onclick: e => {
        const sw = opt.querySelector('.theme-swatch');
        applyThemeWithRipple('custom:' + ct.id, e.clientX, e.clientY,
          sw ? sw.style.background : '');
        $('#themePicker').classList.remove('show');
      }
    });
    opt.appendChild(el('span', {
      class: 'theme-swatch',
      style: `background:linear-gradient(135deg,${ct.accent},${ct.accent2})`

      onclick: e => { e.stopPropagation(); openThemeBuilder(ct); }
    }));
    row.appendChild(el('button', {
      class: 'ct-mini-btn', title: 'Copy theme JSON',
      html: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
      onclick: e => {
        e.stopPropagation();
        const json = JSON.stringify({ customTheme: ct }, null, 2);

function openThemeBuilder(existing) {
  const isEdit = !!existing;
  const draft = normalizeCustomTheme(existing);

  const wrap = el('div', { class: 'theme-builder theme-lab-layout' });
  const controls = el('div', { class: 'theme-lab-controls' });

  function colorField(label, key) {
    const field = el('div', { class: 'theme-lab-field' });
    field.appendChild(el('label', {}, label));
    field.appendChild(el('input', {
      type: 'color',
      value: draft[key],
      oninput: e => { draft[key] = e.target.value; updatePreviewSwatch(); }
    }));
    return field;
  }
  function sliderField(label, key, min, max, step) {
    const field = el('div', { class: 'theme-lab-slider' });
    const value = el('span', {}, String(draft[key]));
    field.appendChild(el('label', {}, [label, ' ', value]));
    field.appendChild(el('input', {
      type: 'range',
      min,
      max,
      step,
      value: draft[key],
      oninput: e => {
        draft[key] = Number(e.target.value);
        value.textContent = String(draft[key]);
        updatePreviewSwatch();
      }
    }));
    return field;
  }

  const nameRow = el('div', { class: 'theme-lab-field' });
  nameRow.appendChild(el('label', {}, 'Theme name'));
  nameRow.appendChild(el('input', {
    type: 'text',
    value: draft.name,
    oninput: e => { draft.name = e.target.value; }
  }));

  const baseRow = el('div', { class: 'theme-lab-field' });
  baseRow.appendChild(el('label', {}, 'Base behavior'));
  const baseSel = el('select', {
    onchange: e => { draft.base = e.target.value; updatePreviewSwatch(); }
  });
  BUILTIN_THEMES.forEach(b => {
    const o = el('option', { value: b.cls }, `${b.name} (${b.kind})`);
    if (b.cls === draft.base) o.selected = true;
    baseSel.appendChild(o);
  });
  baseRow.appendChild(baseSel);

  controls.appendChild(nameRow);
  controls.appendChild(baseRow);
  controls.appendChild(el('div', { class: 'theme-lab-row' }, [
    colorField('Accent', 'accent'),
    colorField('Accent 2', 'accent2')
  ]));
  controls.appendChild(el('div', { class: 'theme-lab-row' }, [
    colorField('Background start', 'bg'),
    colorField('Background end', 'bg2')
  ]));
  controls.appendChild(el('div', { class: 'theme-lab-row' }, [
    colorField('Panel glass', 'surface'),
    colorField('Solid panel', 'surface2')
  ]));
  controls.appendChild(el('div', { class: 'theme-lab-row' }, [
    colorField('Text', 'text'),
    colorField('Muted text', 'muted')
  ]));
  controls.appendChild(el('div', { class: 'theme-lab-row' }, [
    colorField('Border', 'border'),
    sliderField('Gradient angle', 'angle', 0, 180, 5)
  ]));
  controls.appendChild(el('div', { class: 'theme-lab-row' }, [
    sliderField('Radius', 'radius', 6, 22, 1),
    sliderField('Density', 'density', .82, 1.2, .02)
  ]));
  controls.appendChild(sliderField('Glow', 'glow', 8, 45, 1));

  const preview = el('div', { class: 'theme-lab-preview' }, [
    el('div', { class: 'theme-lab-window' }, [
      el('div', { class: 'theme-lab-bar' }),
      el('div', { class: 'theme-lab-card' }, [
        el('div', { class: 'theme-lab-line' }),
        el('div', { class: 'theme-lab-line' }),
        el('div', { class: 'theme-lab-line short' })
      ]),
      el('div', { class: 'theme-lab-button' })
    ])
  ]);

  function updatePreviewSwatch() {
    preview.style.setProperty('--bg-grad',
      `linear-gradient(${draft.angle}deg, ${draft.bg}, ${draft.bg2})`);
    preview.style.setProperty('--surface', hexToRgba(draft.surface, draft.surfaceAlpha));
    preview.style.setProperty('--surface-2', draft.surface2);
    preview.style.setProperty('--text', draft.text);
    preview.style.setProperty('--text-muted', draft.muted);
    preview.style.setProperty('--border', draft.border);
    preview.style.setProperty('--accent', draft.accent);
    preview.style.setProperty('--accent-2', draft.accent2);
    preview.style.setProperty('--accent-grad',
      `linear-gradient(${draft.angle}deg, ${draft.accent}, ${draft.accent2})`);
    preview.style.setProperty('--shadow',
      `0 4px ${Math.round(18 + draft.glow * .6)}px ${hexToRgba(draft.accent, draft.glow / 100)}`);
    preview.style.setProperty('--ui-radius', draft.radius + 'px');
    preview.style.setProperty('--ui-density', String(draft.density));
    preview.querySelector('.theme-lab-window').style.borderRadius = draft.radius + 'px';
    preview.querySelector('.theme-lab-card').style.borderRadius = Math.max(7, draft.radius - 2) + 'px';
    preview.querySelector('.theme-lab-button').style.borderRadius = draft.radius + 'px';
  }
  updatePreviewSwatch();

  wrap.appendChild(controls);
  wrap.appendChild(preview);

  openModal(isEdit ? 'Edit theme' : 'Create theme', [wrap], [
    el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
    el('button', {
      class: 'btn btn-primary',
      onclick: () => {
        if (!draft.name.trim()) { toast('Name required'); return; }
        if (isEdit) {
          const idx = state.customThemes.findIndex(x => x.id === draft.id);
          if (idx >= 0) state.customThemes[idx] = draft;
        } else {
          state.customThemes.unshift(draft);
        }
        state.activeTheme = 'custom:' + draft.id;
        persist();
        renderCustomThemes();
        applyTheme();
        renderAll();
        closeModal();
        toast(isEdit ? 'Theme updated' : 'Theme created');
      }
    }, isEdit ? 'Save changes' : 'Create')
  ]);
}

function normalizeCustomTheme(existing) {
  const base = existing ? { ...existing } : {};
  return {
    id: base.id || ('ct_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6)),
    name: base.name || 'My Theme',
    base: base.base || 'theme-midnight',
    accent: base.accent || '#38bdf8',
    accent2: base.accent2 || '#818cf8',
    bg: base.bg || '#0b1020',
    bg2: base.bg2 || '#1e1b4b',
    surface: base.surface || '#1e293b',
    surfaceAlpha: typeof base.surfaceAlpha === 'number' ? base.surfaceAlpha : 0.74,
    surface2: base.surface2 || '#1e293b',
    text: base.text || '#e2e8f0',
    muted: base.muted || '#94a3b8',
    border: base.border || '#1e293b',
    angle: typeof base.angle === 'number' ? base.angle : 135,
    radius: typeof base.radius === 'number' ? base.radius : 12,
    density: typeof base.density === 'number' ? base.density : 1,
    glow: typeof base.glow === 'number' ? base.glow : 22
  };
}

/* ---------- Theme ripple ---------- */
function applyThemeWithRipple(themeId, x, y, swatchBg) {
  if (typeof x === 'number' && typeof y === 'number') {
    const ripple = document.createElement('div');
    ripple.className = 'theme-ripple';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    ripple.style.background = swatchBg || 'var(--accent-grad)';
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 720);
  }
  state.activeTheme = themeId;
  applyTheme();
  persist();
}

/* ---------- Tag-card hover preview ---------- */
let _hoverTimer = null, _hoverPop = null;
function attachHoverPreview(card, template) {
  card.addEventListener('mouseenter', () => {
    clearTimeout(_hoverTimer);
    _hoverTimer = setTimeout(() => showHoverPreview(card, template), 220);
  });
  card.addEventListener('mouseleave', () => {
    clearTimeout(_hoverTimer);
    hideHoverPreview();
  });
}
function showHoverPreview(card, template) {
  hideHoverPreview();
  const html = previewHTML(template);
  if (!html) return;
  const pop = document.createElement('div');
  pop.className = 'tag-preview-pop'
    + (state.formattedPreview ? ' formatted-preview' : '')
    + (state.uppercaseText ? ' uppercase-text' : '');
  pop.innerHTML = html;
  document.body.appendChild(pop);
  const rect = card.getBoundingClientRect();
  // Default: anchor to the right of the card
  let left = rect.right + 8;
  let top = rect.top;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
  const popRect = pop.getBoundingClientRect();
  if (pop.scrollHeight > pop.clientHeight + 1) pop.classList.add('is-long');
  if (popRect.right > window.innerWidth - 8) {
    left = Math.max(8, rect.left - popRect.width - 8);
    pop.style.left = left + 'px';
  }
  if (popRect.bottom > window.innerHeight - 8) {
    top = Math.max(8, window.innerHeight - popRect.height - 8);
    pop.style.top = top + 'px';
  }
  _hoverPop = pop;
}
function hideHoverPreview() {
  if (_hoverPop) { _hoverPop.remove(); _hoverPop = null; }
}

/* ---------- Focus mode ---------- */
function toggleFocusMode() {
  state.focusMode = !state.focusMode;
  renderAll();
  toast(state.focusMode ? 'Template list collapsed' : 'Template list shown');
}

async function toggleFullscreen() {
  try {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
      toast('Fullscreen on (⌘. to exit)');
    } else {
      await document.exitFullscreen();
      toast('Fullscreen off');
    }
    syncFeatureButtons();
  } catch (err) {
    toast('Fullscreen unavailable');
  }
}

/* ---------- Uppercase text ---------- */
function toggleFormattedPreview() {
  state.formattedPreview = !state.formattedPreview;
  const btn = $('#formatBtn');
  if (btn) btn.classList.toggle('feature-on', state.formattedPreview);
  updatePreview();
  hideHoverPreview();
  persist();
  toast(state.formattedPreview ? 'Formatted preview on' : 'Formatted preview off');
}

function toggleUppercaseText() {
  state.uppercaseText = !state.uppercaseText;
  const btn = $('#uppercaseBtn');
  if (btn) btn.classList.toggle('feature-on', state.uppercaseText);
  updatePreview();
  hideHoverPreview();
  persist();
  toast(state.uppercaseText ? 'Uppercase on' : 'Uppercase off');
}

/* ---------- BOOT ---------- */
loadPersisted();
applyBakedInJson();
seedDefaults();
setupGlobalEvents();
